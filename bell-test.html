<!DOCTYPE html>
<html>
<body style="font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f5f5f5;">
  <button onclick="play()" style="padding:16px 32px;font-size:18px;cursor:pointer;border-radius:8px;border:none;background:#1B2A4A;color:#fff;">
    🔔 종소리 테스트
  </button>
  <script>
    let audioCtx;
    function play() {
      if (!audioCtx) audioCtx = new AudioContext();
      const now = audioCtx.currentTime;
      [
        { freq: 880,  gain: 0.7 },
        { freq: 1108, gain: 0.4 },
        { freq: 2637, gain: 0.2 },
      ].forEach(({ freq, gain: peak }) => {
        const osc = audioCtx.createOscillator();
        const g   = audioCtx.createGain();
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(peak, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
        osc.start(now);
        osc.stop(now + 1.8);
      });
    }
  </script>
</body>
</html>
