<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="theme-color" content="#fafafa">
  <!-- 외부 이미지(Drive / 외부호스트) 로딩 시 Referer 헤더 안 보냄 —
       Google Drive / lh3 가 일부 모바일 브라우저에서 referer 기반 차단하는 이슈 우회 -->
  <meta name="referrer" content="no-referrer">
  <title>freepass erp</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;500&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2/src/regular/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      // 초기 로드 시 controller 존재 여부 기록 — 진짜 SW 전환만 reload 트리거
      const hadController = !!navigator.serviceWorker.controller;
      navigator.serviceWorker.register('/sw.js').then((reg) => {
        // 새 SW 감지 → 설치 → 활성화되면 1회 reload
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw?.addEventListener('statechange', () => {
            if (nw.state === 'activated' && hadController) {
              window.location.reload();
            }
          });
        });
        // controllerchange — skipWaiting 후 새 SW 가 컨트롤 가져올 때
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (hadController) window.location.reload();
        });
      }).catch(() => {});
    }
  </script>
</body>
</html>
