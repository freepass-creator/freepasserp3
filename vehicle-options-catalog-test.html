<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>프리패스 차종 매트릭스</title>
<!-- catalog 단일 진실원 — bundle.js 가 window.CAR_MASTER_INDEX / window.CAR_MASTER 노출 -->
<script src="./public/data/car-master/_bundle.js" onerror="this.dataset.failed=1"></script>
<script src="./data/car-master/_bundle.js" onerror="this.dataset.failed=1"></script>
<script src="./public/data/trim-options-seed.js" onerror="this.dataset.failed=1"></script>
<script src="./data/trim-options-seed.js" onerror="this.dataset.failed=1"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  /* 페이지 세로 스크롤바 항상 자리 확보 — 트림 변경 시 좌우 흔들림 방지 */
  html{scrollbar-gutter:stable;overflow-y:scroll}
  body{font-family:system-ui,-apple-system,sans-serif;font-size:12px;background:#f8fafc;color:#111827;padding:20px;max-width:1200px;margin:0 auto}
  h1{font-size:14px;font-weight:600;margin-bottom:14px}
  .panel{background:#fff;border:1px solid #e5e7eb;border-radius:4px;padding:16px;margin-bottom:12px}
  .selector-row{display:flex;gap:6px;margin-bottom:8px}
  .selector-row #maker{width:150px}
  .selector-row #model{width:220px}
  .selector-row #sub{width:400px}
  select{padding:8px 10px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;font-family:inherit;background:#fff;color:#111827}
  select:disabled{background:#f3f4f6;color:#9ca3af}
  .meta{font-size:11px;color:#6b7280;margin-top:4px}
  .meta.warn{color:#dc2626}
  .meta.ok{color:#059669}
  .trim-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .trim-btn{padding:10px 14px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit;color:#111827;display:inline-flex;flex-direction:column;align-items:flex-start;gap:3px;line-height:1.3;transition:all .15s;min-width:90px}
  .trim-btn .trim-name{font-size:12px;font-weight:500}
  .trim-btn .trim-price{font-size:11px;color:#6b7280;font-variant-numeric:tabular-nums}
  .trim-btn.active{background:#111827;color:#fff;border-color:#111827}
  .trim-btn.active .trim-price{color:#9ca3af}
  .trim-btn:hover:not(.active){background:#eff6ff;border-color:#3b82f6}
  .summary{display:flex;gap:18px;font-size:11px;color:#6b7280;margin-bottom:14px}
  .summary b{color:#111827;font-weight:500}
  .category-block{margin-bottom:14px}
  .cat-title{font-size:12px;color:#6b7280;font-weight:500;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between}
  .cat-title .count{color:#9ca3af}
  .opt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px 18px}
  .opt{padding:5px 0;font-size:12px;line-height:1.4;color:#9ca3af;display:flex;align-items:flex-start;gap:6px}
  .opt.basic{color:#111827}
  .opt.select{color:#6b7280}
  .opt::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:#d1d5db;margin-top:6px;flex-shrink:0}
  .opt.basic::before{background:#111827}
  .opt.select::before{background:#6b7280}
  .opt .badge{display:inline-block;font-size:10px;color:#9ca3af;padding:1px 4px;border:1px solid #e5e7eb;border-radius:2px;margin-left:6px;flex-shrink:0}
  .opt.select .badge{color:#6b7280}
  .pkg-section{margin-bottom:14px}
  .pkg-title{font-size:12px;color:#6b7280;font-weight:500;margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline}
  .pkg-title .hint{font-size:10px;color:#9ca3af;font-weight:400}
  .pkg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px}
  .pkg{padding:8px 10px;border:1px solid #e5e7eb;border-radius:4px;background:#fafafa;cursor:pointer;transition:background .1s,border-color .1s;user-select:none}
  .pkg:hover{background:#f3f4f6;border-color:#d1d5db}
  .pkg.selected{background:#eff6ff;border-color:#3b82f6}
  .pkg.selected .pkg-head, .pkg.selected .pkg-name{color:#1e40af}
  .pkg.disabled{opacity:.5;cursor:not-allowed}
  /* conflict — 다른 패키지와 배타. 회색 톤 + 취소선 + 호버 시도 비활성 느낌 (클릭은 가능, 클릭 시 자동 해제됨) */
  .pkg.conflict{
    background:#f9fafb;
    border-color:#e5e7eb;
    border-style:dashed;
  }
  .pkg.conflict .pkg-head, .pkg.conflict .pkg-name, .pkg.conflict .pkg-items{
    color:#9ca3af;
    text-decoration:line-through;
    text-decoration-color:#d1d5db;
  }
  .pkg.conflict .pkg-price{color:#cbd5e1;text-decoration:line-through}
  .pkg.conflict:hover{background:#f3f4f6;border-color:#d1d5db}
  .pkg.conflict .conflict-with{
    display:block;
    font-size:9px;
    color:#d97706;
    font-weight:500;
    margin-top:3px;
    text-decoration:none;
  }
  .pkg .pkg-head{font-size:11px;color:#111827;font-weight:500;display:flex;justify-content:space-between;gap:8px;margin-bottom:4px}
  .pkg .pkg-name{font-size:11px;color:#111827;line-height:1.3;font-weight:500;display:flex;justify-content:space-between;gap:8px}
  .pkg .pkg-price{color:#dc2626;font-variant-numeric:tabular-nums;flex-shrink:0}
  .pkg .pkg-items{font-size:10px;color:#6b7280;line-height:1.4;display:none;margin-top:6px;padding-top:6px;border-top:1px dashed #e5e7eb}
  .pkg:hover .pkg-items{display:block}
  .pkg .pkg-fp-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
  .pkg .pkg-fp-chip{font-size:9px;padding:1px 5px;background:#dbeafe;color:#1e40af;border-radius:3px;line-height:1.3}
  .pkg.selected .pkg-fp-chip{background:#1e40af;color:#fff}
  .price-calc{display:flex;justify-content:space-between;align-items:baseline;padding:12px 14px;background:#fff;border:1px solid #e5e7eb;border-radius:4px;margin-bottom:14px}
  .price-calc .breakdown{font-size:11px;color:#6b7280;font-variant-numeric:tabular-nums}
  .price-calc .breakdown .add{color:#3b82f6;margin-left:8px}
  .price-calc .breakdown .muted{color:#9ca3af}
  .price-calc .total{font-size:15px;font-weight:600;color:#111827;font-variant-numeric:tabular-nums}
  .price-calc .total .label{font-size:11px;color:#6b7280;font-weight:400;margin-right:6px}
  .empty{font-size:11px;color:#9ca3af;padding:60px 0;text-align:center}
  /* catalogPanel: 자체 스크롤 X — body 단일 스크롤. sticky 헤더로 트림 바 고정 */
  #catalogPanel{min-height:520px}
  #emptyPanel{min-height:520px;display:flex;align-items:center;justify-content:center}
  .raw-toggle{font-size:11px;color:#6b7280;cursor:pointer;text-decoration:underline;margin-top:14px}
  pre{background:#f9fafb;border:1px solid #e5e7eb;border-radius:4px;padding:10px;font-size:11px;overflow:auto;max-height:400px;margin-top:8px;white-space:pre-wrap}
  /* ─── 프리패스 표준 옵션 (95개) ─── */
  #fpOptionsSection{margin-top:20px;padding-top:18px;border-top:2px solid #e5e7eb}
  #fpOptionsSection h3{font-size:13px;font-weight:600;color:#111827;margin:0}
  .popular-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:8px}
  .pop-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;background:#fff;transition:all .15s}
  .pop-card:hover{border-color:#3b82f6}
  .pop-card.has{border-color:#3b82f6;background:#eff6ff}
  .pop-card .icon{width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:#cbd5e1}
  .pop-card.has .icon{color:#3b82f6}
  .pop-card .lbl{font-size:11px;color:#94a3b8;text-align:center;line-height:1.3}
  .pop-card.has .lbl{color:#0f172a;font-weight:500}
  .pop-sub-section{margin-top:12px;padding-top:10px;border-top:1px dashed #e5e7eb}
  .pop-sub-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:11px;color:#94a3b8;font-weight:500}
  .popular-sub-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .pop-card-sm{display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 4px;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer;background:#fff}
  .pop-card-sm:hover{border-color:#3b82f6}
  .pop-card-sm.has{border-color:#3b82f6;background:#eff6ff}
  .pop-card-sm .icon{width:18px;height:18px;color:#cbd5e1}
  .pop-card-sm.has .icon{color:#3b82f6}
  .pop-card-sm .lbl{font-size:10px;color:#94a3b8;text-align:center}
  .pop-card-sm.has .lbl{color:#0f172a;font-weight:500}
  .fp-all-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 0;margin-top:12px;border-top:1px solid #e5e7eb;color:#475569;font-size:12px;font-weight:500}
  .fp-all-toggle:hover{color:#3b82f6}
  .fp-all-toggle b{color:#3b82f6}
  #fpAllWrap{display:none;margin-top:8px}
  #fpAllWrap.open{display:block}
  .fp-cat-block{margin-bottom:14px}
  .fp-cat-title{font-size:12px;color:#374151;font-weight:600;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between}
  .fp-cat-title .count{color:#3b82f6}
  .fp-opt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px 18px}
  .fp-opt{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;color:#94a3b8;cursor:pointer}
  .fp-opt.has{color:#0f172a}
  .fp-opt input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#3b82f6}
  .fp-opt label{cursor:pointer;flex:1;line-height:1.3}
  .fp-opt-uncertain.has{background:#fffbeb;border-radius:3px;padding:4px 6px;margin:-3px -6px;color:#0f172a}
  .fp-opt-uncertain.has label::after{content:" ⚠";color:#d97706;font-weight:600}
  .fp-opt-badge{display:inline-block;padding:1px 5px;background:#fef3c7;color:#92400e;border-radius:3px;font-size:9px;font-weight:600;margin-left:4px}
  /* 제조사 옵션 펼치기/접기 wrap */
  #manuWrap{display:none}
  #manuWrap.open{display:block}
  /* 상단 selector + 트림 bar 한 묶음 sticky — 묶음 자체가 박스로 고정 */
  #stickyZone{position:sticky;top:0;z-index:50;background:#f8fafc;padding-bottom:6px;margin-bottom:12px;box-shadow:0 4px 8px -4px rgba(0,0,0,.08)}
  #stickyZone #selectorPanel{margin-bottom:0;background:#fff;border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom:none;padding-bottom:10px}
  #trimBarWrap{background:#fff;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 4px 4px;padding:12px 16px;display:none;gap:8px}
  #trimBarWrap.trim-bar{margin-bottom:0}
  #trimBarWrap.visible{display:flex;flex-wrap:wrap}
  /* catalogPanel 내부의 trimBar 는 숨기고 위에 고정된 trimBarWrap 사용 */
  #catalogPanel .trim-bar{display:none}
  /* 패널 외부 영역 흰 배경 안 보이게 */
  body{background:#f8fafc}
</style>
</head>
<body>

<h1>프리패스 차종 매트릭스 <span style="font-size:11px;font-weight:400;color:#9ca3af;margin-left:6px">트림 × 옵션 × 패키지</span></h1>

<!-- 가격표 오버레이 모달 (자체 표 — 외부 iframe X) -->
<div id="priceModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:8px;width:100%;max-width:1400px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="padding:14px 18px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <h3 id="priceModalTitle" style="margin:0;font-size:14px;font-weight:600">📄 가격표</h3>
      <button id="priceModalClose" style="background:transparent;border:none;font-size:22px;cursor:pointer;color:#6b7280;padding:0 4px;line-height:1">×</button>
    </div>
    <div id="priceModalBody" style="padding:18px;overflow-y:auto;flex:1"></div>
    <div style="padding:10px 16px;border-top:1px solid #e5e7eb;font-size:11px;color:#6b7280;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:#fafafa">
      <span id="priceModalFooter"></span>
      <a id="priceModalSource" href="#" target="_blank" rel="noopener" style="color:#3b82f6;text-decoration:underline">출처 원본 ↗</a>
    </div>
  </div>
</div>

<!-- selector + 트림 bar 묶음 sticky (한 박스로 위에 고정) -->
<div id="stickyZone">
  <div class="panel" id="selectorPanel">
    <div class="selector-row">
      <select id="maker" disabled><option>제조사 로딩중…</option></select>
      <select id="model" disabled><option>모델</option></select>
      <select id="sub" disabled><option>세부모델</option></select>
    </div>
    <select id="trim" disabled style="display:none"><option>트림</option></select>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
      <label style="font-size:11px;color:#6b7280;cursor:pointer;display:inline-flex;align-items:center;gap:4px">
        <input type="checkbox" id="showYear" checked style="margin:0">
        세부모델에 생산기간 표시
      </label>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px;flex-wrap:wrap">
      <div class="meta" id="status">프리패스 차종 매트릭스 로딩…</div>
      <a id="priceSheetLink" href="#" target="_blank" rel="noopener" style="display:none;font-size:12px;color:#3b82f6;text-decoration:none;padding:4px 10px;border:1px solid #bfdbfe;border-radius:4px;background:#eff6ff;font-weight:500;white-space:nowrap">📄 가격표 보기 ↗</a>
    </div>
  </div>
  <!-- 트림 bar (selector 아래 같은 sticky 묶음) -->
  <div id="trimBarWrap" class="trim-bar"></div>
</div>

<div class="panel" id="catalogPanel" style="display:none">
  <div class="trim-bar" id="trimBar"></div>
  <div class="summary" id="summary"></div>
  <div class="fp-all-toggle" id="manuToggle" style="margin-top:0;border-top:none">
    <span><b id="manuLabel">제조사 옵션</b> <span style="color:#9ca3af" id="manuCount"></span></span>
    <span id="manuChevron">▴</span>
  </div>
  <div id="manuWrap" class="open"><div id="trimContent"></div></div>

  <!-- ─── 프리패스 표준 주요옵션 (15개) ─── -->
  <div id="fpOptionsSection" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">
      <h3>프리패스 표준 주요옵션 <span style="font-size:11px;font-weight:400;color:#9ca3af;margin-left:6px">15개</span></h3>
      <span id="popSummary" style="font-size:11px;color:#6b7280">0 / 15</span>
    </div>
    <div class="popular-grid" id="popularGrid"></div>
    <div class="popular-sub-grid" id="popularSubGrid" style="display:none"></div>
    <div class="fp-all-toggle" id="fpAllToggle">
      <span><b id="fpTotalSummary">0 / 95</b>개 세부옵션 모두보기</span>
      <span id="fpChevron">▾</span>
    </div>
    <div id="fpAllWrap">
      <div id="fpCategories"></div>
      <div style="margin-top:14px;padding:10px 12px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;font-size:11px;color:#6b7280;line-height:1.5">
        <b style="color:#374151">세부옵션 유의사항</b><br>
        위 정보는 제조사에서 제공하는 출고시 옵션을 기준으로 작성되었습니다.
        일부 표출되지 않거나 실제 차량 정보와 차이가 있을 수 있으니,
        출고 전 업체 상담을 통해 정확한 옵션 사항을 확인 바랍니다.
      </div>
    </div>
  </div>

  <div class="raw-toggle" id="rawToggle">▾ 원본 JSON 보기</div>
  <pre id="rawJson" style="display:none"></pre>
</div>

<div class="panel" id="emptyPanel">
  <div class="empty" id="emptyMsg">차종을 선택하세요.</div>
</div>

<script>
const $ = id => document.getElementById(id);
const state = {
  master: [],
  selected: null,        // 프리패스 차종 매트릭스 row
  catalog: null,         // car-options-catalog JSON
  activeTrim: null,
  selectedPkgs: new Set(), // 선택한 패키지 인덱스
  fpOptions: new Set(),  // 프리패스 표준 옵션 ID 셋
  codeByEncar: {},       // encar_key → catalog code
  titleByEncar: {}       // encar_key → catalog title (메이커 prefix 제거된 형태)
};

/* ─── 프리패스 표준 옵션 마스터 (95개) ─── */
const OPTIONS = {
  exterior: { label:'외관', items: [
    ['SUNROOF','썬루프(일반)','opt'],['SUNROOF_PANO','파노라마 썬루프','opt'],['SUNROOF_SAFETY','세이프티 썬루프','opt'],
    ['HEAD_LED','LED 헤드램프'],['HEAD_HID','제논 헤드램프(HID)','unc'],['POSITION_LED','LED 포지션램프'],
    ['DRL','주간 주행등'],['LED_TURN','LED 방향지시등','unc'],
    ['MIRROR_FOLD','전동접이 사이드미러'],
    ['ROOF_RACK','루프랙','unc'],['ALUMINUM_WHEEL','알루미늄휠'],
    ['FOG_LED','안개등 (LED)'],['REAR_LED_COMBI','LED 리어 콤비네이션 램프'],
    ['REAR_SPOILER','리어 스포일러','unc'],['SHARK_FIN','샤크핀 안테나','unc'],
    ['UV_GLASS','자외선 차단 유리','unc'],['LAMINATED_GLASS','이중접합 차음 유리','unc'],
    ['AERO_WIPER','에어로 타입 와이퍼','unc'],
  ]},
  interior: { label:'내장', items: [
    ['CRUISE','크루즈컨트롤'],['STR_REMOTE','스티어링 휠 리모컨'],
    ['PADDLE_SHIFT','패들 쉬프트','unc'],
    ['AUTO_LIGHT','오토 라이트 컨트롤'],['POWER_STR','파워 스티어링'],
    ['HANDS_FREE','핸즈프리'],['HEAT_STR','열선 스티어링휠','unc'],
    ['POWER_SEAT_DR','전동시트(운전석)'],['POWER_SEAT_PS','전동시트(동승석)','unc'],
    ['MEMORY_SEAT_DR','메모리시트(운전석)','unc'],
    ['HEAT_SEAT_FRONT','열선시트(앞좌석)'],['HEAT_SEAT_REAR','열선시트(뒷좌석)','unc'],
    ['VENT_SEAT_DR','통풍시트(운전석)','unc'],['VENT_SEAT_PS','통풍시트(동승석)','unc'],
    ['SEAT_LEATHER','가죽시트'],['SEAT_FABRIC','직물 시트'],
    ['STR_LEATHER','가죽 스티어링 휠','unc'],
    ['ECM_MIRROR','ECM룸미러'],

const SUB_POPULAR_OPTIONS = [];   // 통합 — 보조 영역 폐기

function fpToggle(id) {
  if (state.fpOptions.has(id)) state.fpOptions.delete(id);
  else state.fpOptions.add(id);
  renderFpOptions();
}

function renderFpOptions() {
  // 주요옵션 카드
  const grid = $('popularGrid');
  if (!grid) return;
  grid.innerHTML = '';
  let popCnt = 0;
  POPULAR_OPTIONS.forEach(([id, label, icon]) => {
    const has = state.fpOptions.has(id);
    if (has) popCnt++;
    const div = document.createElement('div');
    div.className = 'pop-card' + (has ? ' has' : '');
    div.innerHTML = `<div class="icon"><i class="ph ph-${icon}" style="font-size:26px"></i></div><div class="lbl">${label}</div>`;
    div.addEventListener('click', () => fpToggle(id));
    grid.appendChild(div);
  });
  $('popSummary').textContent = `${popCnt} / ${POPULAR_OPTIONS.length}`;

  // 알면 좋을만한 옵션
  const subGrid = $('popularSubGrid');
  subGrid.innerHTML = '';
  let subCnt = 0;
  SUB_POPULAR_OPTIONS.forEach(([id, label, icon]) => {
    const has = state.fpOptions.has(id);
    if (has) subCnt++;
    const div = document.createElement('div');
    div.className = 'pop-card-sm' + (has ? ' has' : '');
    div.innerHTML = `<div class="icon"><i class="ph ph-${icon}" style="font-size:16px"></i></div><div class="lbl">${label}</div>`;
    div.addEventListener('click', () => fpToggle(id));
    subGrid.appendChild(div);
  });
  $('popSubSummary').textContent = `${subCnt} / ${SUB_POPULAR_OPTIONS.length}`;

  // 전체 95개 카테고리별
  const cats = $('fpCategories');
  cats.innerHTML = '';
  let totalCnt = 0;
  Object.values(OPTIONS).forEach(cat => {
    const cnt = cat.items.filter(([id]) => state.fpOptions.has(id)).length;
    totalCnt += cnt;
    const div = document.createElement('div');
    div.className = 'fp-cat-block';
    div.innerHTML = `
      <div class="fp-cat-title">${cat.label} <span class="count">${cnt} / ${cat.items.length}</span></div>
      <div class="fp-opt-grid">${cat.items.map(([id, name, kind]) => {
        const checked = state.fpOptions.has(id);
        const cls = ['fp-opt'];
        if (checked) cls.push('has');
        if (kind === 'unc') cls.push('fp-opt-uncertain');
        const badge = kind === 'opt' ? '<span class="fp-opt-badge">선택</span>' : '';
        return `<div class="${cls.join(' ')}"><input type="checkbox" id="fp-${id}" ${checked ? 'checked' : ''} data-id="${id}"><label for="fp-${id}">${name}${badge}</label></div>`;
      }).join('')}</div>`;
    cats.appendChild(div);
  });
  cats.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => fpToggle(cb.dataset.id));
  });
  $('fpTotalSummary').textContent = `${totalCnt} / ${FP_TOTAL}`;
  if (window.lucide && lucide.createIcons) lucide.createIcons();
}

    .replace(/\s+/g, '');

// 카탈로그 옵션 이름 → FP 옵션 ID 배열 (다중 매칭 가능)
function matchFpByName(name) {
  if (!name) return [];
  const n = _normName(name);
  const matched = new Set();
  for (const { kw, ids } of FP_KEYWORD_RULES) {
    if (kw && n.includes(kw)) {
      ids.forEach(id => matched.add(id));
    }
  }
  return [...matched];
}

function fpIdsOf(info) {
  // 옵션 사전에 사전 매핑된 fp_ids[] 우선, 없으면 옵션명 동적 매칭
  if (!info) return [];
  if (Array.isArray(info.fp_ids)) return info.fp_ids;
  return matchFpByName(info.name);
}
function matchCatalogToFp(catalog, trimName) {
  const matched = new Set();
  const t = catalog.trims[trimName];
  if (!t) return matched;
  // 1. basic 옵션
  if (Array.isArray(t.basic)) {
    for (const optId of t.basic) {
      fpIdsOf(catalog.options[optId]).forEach(id => matched.add(id));
    }
  }
  // 2. 직원이 선택한 패키지의 코드 → 옵션 → FP 매칭
  if (Array.isArray(t.select_groups)) {
    for (const idx of state.selectedPkgs) {
      const group = t.select_groups[idx];
      if (!group) continue;
      const codes = Array.isArray(group) ? group : (group.codes || []);
      for (const optId of codes) {
        fpIdsOf(catalog.options[optId]).forEach(id => matched.add(id));
      }
      // 패키지 자체에 name 이 있으면 그것도 매칭 시도 (예: "컴포트 II 패키지")
      if (!Array.isArray(group) && group.name) {
        matchFpByName(group.name).forEach(id => matched.add(id));
      }
    }
  }
  return matched;
}

/* 가격표 — 위키카 원본 가격표 스타일 + 연료/유종별 그룹 분할 */
function buildPriceTable(cat) {
  const fmtMan = v => v ? Math.round(v / 10000).toLocaleString() + '만' : '-';
  const categories = cat.categories || {};

  const collectSelects = (t) => {
    const items = [];
    (t.select_groups || []).forEach(g => {
      if (Array.isArray(g)) return;
      const codes = g.codes || [];
      const names = codes.map(c => cat.options[c]?.name).filter(Boolean);
      const display = g.name || names.join(' + ');
      items.push({ display, price: g.price || 0 });
    });
    return items.sort((a, b) => b.price - a.price);
  };

  const renderRows = (trimNames) => {
    let h = `<table style="width:100%;border-collapse:collapse;font-size:11px;line-height:1.55;margin-bottom:18px">`;
    h += `<thead><tr style="background:#f9fafb">
      <th style="text-align:center;padding:10px 8px;border-bottom:2px solid #d1d5db;width:120px;font-weight:600">트림</th>
      <th style="text-align:center;padding:10px 8px;border-bottom:2px solid #d1d5db;width:110px;font-weight:600">판매가격</th>
      <th style="text-align:left;padding:10px 12px;border-bottom:2px solid #d1d5db;font-weight:600">주요 기본 품목</th>
      <th style="text-align:left;padding:10px 10px;border-bottom:2px solid #d1d5db;width:200px;font-weight:600">선택품목<br><span style="font-size:9px;color:#9ca3af;font-weight:400">(세제혜택 적용 전 기준)</span></th>
    </tr></thead><tbody>`;

    for (const tname of trimNames) {
      const t = cat.trims[tname];
      const p = t.price || {};
      const taxBefore = p.tax_5_before || p.tax_5 || p.base || 0;
      const taxAfter  = p.tax_3_5_after || p.tax_3_5 || p.tax_3_5_before || 0;

      const basicSet = new Set(t.basic || []);
      const grpItems = [];
      for (const [catName, codes] of Object.entries(categories)) {
        const items = codes.filter(c => basicSet.has(c)).map(c => cat.options[c]?.name || c).filter(Boolean);
        if (items.length) grpItems.push({ catName, items });
      }
      const selects = collectSelects(t);

      h += `<tr style="vertical-align:top;border-bottom:1px solid #e5e7eb">
        <td style="text-align:center;padding:14px 8px;font-weight:600;background:#fafafa;border-right:1px solid #e5e7eb">${tname}</td>
        <td style="text-align:center;padding:14px 8px;border-right:1px solid #e5e7eb;font-variant-numeric:tabular-nums">
          <div style="font-weight:600;color:#111827;font-size:12px">${fmtMan(taxBefore)}</div>
          ${taxAfter ? `<div style="margin-top:8px;padding-top:8px;border-top:1px dashed #e5e7eb;font-size:10px;color:#6b7280">친환경차<br>세제혜택 후</div>
          <div style="font-weight:600;color:#dc2626;font-size:12px;margin-top:2px">${fmtMan(taxAfter)}</div>` : ''}
        </td>
        <td style="padding:14px 12px;border-right:1px solid #e5e7eb">
          ${grpItems.length ? grpItems.map(g => `
            <div style="margin-bottom:6px"><span style="font-weight:600;color:#111827">• ${g.catName}</span> <span style="color:#374151">: ${g.items.join(', ')}</span></div>
          `).join('') : '<span style="color:#9ca3af">-</span>'}
        </td>
        <td style="padding:14px 10px;font-size:10.5px;color:#374151">
          ${selects.length ? selects.map(s => {
            const priceTxt = s.price ? ` <span style="color:#dc2626;font-weight:600">${fmtMan(s.price)}</span>` : '';
            return `<div style="margin-bottom:4px">• ${s.display}${priceTxt}</div>`;
          }).join('') : '<span style="color:#9ca3af">-</span>'}
        </td>
      </tr>`;
    }
    h += `</tbody></table>`;
    return h;
  };

  // 트림을 연료/배기량별로 그룹화 — 트림명 마지막 괄호 안 텍스트 기준
  const groups = new Map();
  for (const tname of Object.keys(cat.trims)) {
    const m = tname.match(/\(([^)]+)\)\s*$/);
    const key = m ? m[1].trim() : '기본';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(tname);
  }
  // 우선순위: 가솔린 > 하이브리드 > LPG > 디젤 > N라인 > 영업용 > 장애인용 > 기타
  const order = (k) => {
    const lk = k.toLowerCase();
    if (lk === '기본' || /^[\d.]+$/.test(k) || /가솔린/.test(k)) return 0;
    if (/하이브리드/.test(k)) return 1;
    if (/lpg|lpi/i.test(k)) return 2;
    if (/디젤|tdi|dt/i.test(k)) return 3;
    if (/n라인|nline/i.test(k)) return 4;
    if (/영업용/.test(k)) return 5;
    if (/장애인/.test(k)) return 6;
    return 9;
  };
  const sortedGroups = [...groups.entries()].sort((a, b) => order(a[0]) - order(b[0]) || a[0].localeCompare(b[0], 'ko'));

  let html = `<div style="text-align:right;font-size:10px;color:#6b7280;margin-bottom:8px">(${cat.fetched_at || ''} 기준, 단위: 원)</div>`;

  if (sortedGroups.length === 1) {
    html += renderRows(sortedGroups[0][1]);
  } else {
    for (const [key, trimList] of sortedGroups) {
      const label = key === '기본' ? cat.title : `${cat.title} - ${key}`;
      html += `<div style="margin:14px 0 8px;font-size:13px;font-weight:600;padding:9px 14px;background:#eff6ff;border-left:3px solid #3b82f6;color:#1e40af">${label} <span style="font-size:11px;color:#3b82f6;font-weight:400">(${trimList.length}개 트림)</span></div>`;
      html += renderRows(trimList);
    }
  }

  return html;
}

function prefillFpFromSeed() {
  state.fpOptions = new Set();
  if (!state.selected || !state.activeTrim) return;
  // 1순위: 카탈로그 (제조사 실데이터)
  if (state.catalog) {
    const matched = matchCatalogToFp(state.catalog, state.activeTrim);
    matched.forEach(id => state.fpOptions.add(id));

  // 2순위: AI 시드 (카탈로그 못 잡은 옵션 보완)
  const seed = window.TRIM_OPTIONS_SEED?.[state.selected._key]?.trims?.[state.activeTrim];
  if (Array.isArray(seed)) seed.forEach(id => state.fpOptions.add(id));
}

// 제네시스: sub 에 코드명 거의 없음 → 모델별 기본 코드 부여
const GENESIS_DEFAULT_CODE = {
  'G70': 'IK',
  'G80': 'RG3',     // RG3 = 현재 / DH = 이전
  'G90': 'RS4',     // RS4 = 현재 / RS3 = 이전 (EQ900)
  'GV60': 'JW',
  'GV70': 'JK1',
  'GV80': 'JX1'

// row.sub 에서 동력원 keyword 추출 — catalog title 만 쓰면 가솔린/하이브리드/EV 가 같은 sub 가 되어 dropdown 중복 발생
function _powertrainKw(rowSub) {
  const s = String(rowSub || '');
  if (/플러그인|PHEV/i.test(s)) return '플러그인 하이브리드';
  if (/하이브리드|HEV|hybrid/i.test(s)) return '하이브리드';
  if (/일렉트릭|electric/i.test(s)) return '일렉트릭';
  if (/\bEV\b/.test(s)) return 'EV';
  if (/전기차|전기/.test(s)) return '전기';
  return '';
}
function normalizeSub(row) {
  // 1순위: 카탈로그 매핑 — title 그대로 사용 (페이스리프트 prefix "디 올 뉴" / "더 뉴" 자동 반영)
  const catTitle = state.titleByEncar?.[row._key];
  if (catTitle) {
    // 동력원 keyword 보존: catalog title 이 가솔린/하이브리드/EV 통합 명칭이면 row.sub 의 동력원 keyword 를 다시 붙여 dropdown 중복 방지
    const kw = _powertrainKw(row.sub);
    if (kw && !catTitle.includes(kw)) return `${catTitle} ${kw}`;
    return catTitle;
  }

  // 2순위: 카탈로그 매핑 없음 — sub 정리 + GEN_CODE_MAP fallback
  let s = (row.sub || '');
  s = s.replace(/\s*\(\d{4}\s*[~–\-]\s*(\d{4}|현재)\s*\)\s*/g, ' ');  // 연도 범위 제거
  s = s.replace(/\s*\(([^)]+)\)/g, ' $1');                              // 일반 괄호 평문화
  s = s.replace(/\s+/g, ' ').trim();
  const codes = GEN_CODE_MAP[row.maker]?.[row.model];
  if (codes) {
    for (const [gen, code] of Object.entries(codes)) {
      s = s.replace(new RegExp(gen, 'g'), code);
    }
  }
  s = s.replace(/\s*\d세대\s*/g, ' ').replace(/\s+/g, ' ').trim();
  // 제네시스 기본 코드 fallback
  if (row.maker === '제네시스') {
    const defaultCode = GENESIS_DEFAULT_CODE[row.model];
    if (defaultCode && !/[A-Z]+\d+|RJ|JF|DH|RS3/i.test(s)) {
      const ps = row.production_start || '';
      let codeUsed = defaultCode;
      if (row.model === 'G80' && ps < '2020-01') codeUsed = 'DH';
      else if (row.model === 'G90' && ps < '2022-01') codeUsed = 'RS3';
      s = s.replace(new RegExp(row.model, 'g'), row.model + ' ' + codeUsed).replace(/\s+/g, ' ');
    }
  }
  return s;
}

async function loadMaster() {
  // catalog _index.json 단일 진실원 — encar-master-seed 폐기
  // catalog entry → master row 형태로 변환 (maker/model/sub/production_start/end/catalog_id)
  const idx = await loadIndex();
  if (!idx || !Object.keys(idx).length) return null;
  const rows = Object.values(idx).map((c, i) => {
    const sub = (c.title || '').replace(new RegExp('^' + (c.maker || '') + '\\s+'), '').trim();
    return {
      _key: `cat_${c.id || i}`,
      maker: c.maker || '',
      model: c.model_root || '',
      sub: sub || c.id,
      car_name: c.title || c.id,
      catalog_id: c.id,
      production_start: c.year_start || '',
      production_end: c.year_end || '',
      archived: false,
      status: 'active',
      category: '',
      fuel_type: '',
    };
  });
  return rows.filter(withinScope);
}

// 매번 최신 데이터 — dev 단계라 캐시 안 잡힘
const _cb = () => '?t=' + Date.now();
async function loadIndex() {
  // 1) script 태그로 로드된 window.CAR_MASTER_INDEX (file:// 더블클릭 OK)
  if (window.CAR_MASTER_INDEX) return window.CAR_MASTER_INDEX;
  // 2) fetch fallback (Vite dev 서버 환경)
  const candidates = [
    '/data/car-master/_index.json',
    './public/data/car-master/_index.json',
    'public/data/car-master/_index.json'
  ];
  for (const url of candidates) {
    try {
      const res = await fetch(url + _cb(), { cache: 'no-store' });
      if (res.ok) return await res.json();
    } catch {}
  }
  return {};
}

async function loadCatalogById(catalogId) {
  if (!catalogId) return null;

  const candidates = [
    `/data/car-master/${catalogId}.json`,
    `./public/data/car-master/${catalogId}.json`,
    `public/data/car-master/${catalogId}.json`
  ];
  for (const url of candidates) {
    try {
      const res = await fetch(url + _cb(), { cache: 'no-store' });
      if (res.ok) return await res.json();
    } catch {}
  }
  return null;
}

async function loadCatalog(encarKey) {
  // master row 의 _key (cat_<catalog_id>) 에서 catalog_id 추출

    ? String(encarKey).slice(4)

function fillMakers() {
  const sel = $('maker');
  sel.innerHTML = '<option value="">제조사 선택</option>';
  const makers = [...new Set(state.master.map(r => r.maker).filter(Boolean))];
  makers.sort((a,b) => {
    const r = makerRank(a) - makerRank(b);
    return r !== 0 ? r : a.localeCompare(b,'ko');
  });
  makers.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    sel.appendChild(opt);
  });
  sel.disabled = false;
}

function onMakerChange() {
  const m = $('maker').value;
  const sel = $('model');
  sel.innerHTML = '<option value="">모델</option>';
  if (!m) { sel.disabled = true; resetCatalog(); return; }
  // 모델 정렬: 같은 maker 내 sub_model 수 desc → 가나다
  const modelCounts = {};
  state.master.filter(r => r.maker === m).forEach(r => {
    if (r.model) modelCounts[r.model] = (modelCounts[r.model]||0) + 1;
  });
  const models = Object.keys(modelCounts).sort((a,b) => {
    const cd = modelCounts[b] - modelCounts[a];
    return cd !== 0 ? cd : a.localeCompare(b,'ko');
  });
  models.forEach(mod => {
    const opt = document.createElement('option');
    opt.value = mod; opt.textContent = mod;
    sel.appendChild(opt);
  });
  sel.disabled = false;
  $('sub').innerHTML = '<option>세부모델</option>'; $('sub').disabled = true;
  $('trim').innerHTML = '<option>트림</option>'; $('trim').disabled = true;
  resetCatalog();
}

// 페이스리프트 split — 엔카가 통합 entry로 둔 차종을 페리 전/후로 분리 표시
//   catalogId 다를 시 다른 catalog 로드 (페리 전후 가격/옵션 차이 반영)
//   배열 첫 번째 = 최신(페리 후), 두 번째 = 페리 전
const FL_SPLITS = {
  'encar_007_002_006': [   // 제네시스 G80 RG3
    { display: '디 올 뉴 G80 RG3', from: '2024-01', catalogId: 'genesis_g80_rg3' },
    { display: 'G80 RG3',          from: '2020-01', to: '2023-12', catalogId: 'genesis_g80_rg3_pre' },
  ],
  'encar_007_006_008': [   // 제네시스 GV70
    { display: '디 올 뉴 GV70', from: '2024-01', catalogId: 'genesis_gv70' },
    { display: 'GV70',          from: '2020-01', to: '2023-12', catalogId: 'genesis_gv70_pre' },
  ],
  'encar_007_005_005': [   // 제네시스 GV80
    { display: '디 올 뉴 GV80', from: '2024-01', catalogId: 'genesis_gv80' },
    { display: 'GV80',          from: '2020-01', to: '2023-12', catalogId: 'genesis_gv80_pre' },
  ],
  'encar_001_019_182': [   // 현대 아반떼 CN7
    { display: '더 뉴 아반떼 CN7', from: '2023-01', catalogId: 'hyundai_avante_cn7' },
    { display: '아반떼 CN7',       from: '2020-01', to: '2022-12', catalogId: 'hyundai_avante_cn7_pre' },
  ],
  'encar_001_019_183': [   // 현대 아반떼 하이브리드 CN7
    { display: '더 뉴 아반떼 하이브리드 CN7', from: '2023-01', catalogId: 'hyundai_avante_cn7' },
    { display: '아반떼 하이브리드 CN7',       from: '2020-01', to: '2022-12', catalogId: 'hyundai_avante_cn7_pre' },
  ],
};

function onModelChange() {
  const maker = $('maker').value;
  const model = $('model').value;
  const sel = $('sub');
  sel.innerHTML = '<option value="">세부모델</option>';
  if (!model) { sel.disabled = true; resetCatalog(); return; }
  const subs = state.master.filter(r => r.maker === maker && r.model === model);
  // 정렬 규격: 1) production_start 내림차순(최신 먼저)  2) 동일 시기면 동력원 순(base → 하이브리드 → 플러그인 → EV)
  function fuelOrder(s) {
    const txt = String(s || '');
    if (/(EV|일렉트릭|electric|전기차)/i.test(txt)) return 3;
    if (/(플러그인|PHEV)/i.test(txt)) return 2;
    if (/(하이브리드|HEV|hybrid)/i.test(txt)) return 1;
    return 0;
  }
  subs.sort((a, b) => {
    const ya = a.production_start || '';
    const yb = b.production_start || '';
    if (ya !== yb) return yb.localeCompare(ya);
    return fuelOrder(a.sub) - fuelOrder(b.sub);
  });
  const showYear = $('showYear')?.checked;
  subs.forEach(r => {
    const splits = FL_SPLITS[r._key];
    if (splits) {
      // FL split 으로 두 entry 추가 (split index encode in value)
      splits.forEach((sp, idx) => {
        const opt = document.createElement('option');
        opt.value = `${r._key}::${idx}`;  // encar_key::split_idx
        const yr = `${sp.from.slice(0,4)}~${sp.to ? sp.to.slice(0,4) : '현재'}`;
        opt.textContent = showYear ? `${sp.display} (${yr})` : sp.display;
        sel.appendChild(opt);
      });
    } else {
      const opt = document.createElement('option');
      opt.value = r._key;
      const yr = (r.production_start||'').slice(0,4) + '~' + ((r.production_end||'').slice(0,4) || '현재');
      opt.textContent = showYear ? `${normalizeSub(r)} (${yr})` : normalizeSub(r);
      sel.appendChild(opt);
    }
  });
  sel.disabled = false;
  $('trim').innerHTML = '<option>트림</option>'; $('trim').disabled = true;
  resetCatalog();
}

async function onSubChange() {
  const rawValue = $('sub').value;
  if (!rawValue) { resetCatalog(); return; }
  // FL split: "encar_key::idx" 형식 — split.catalogId 우선
  const [encarKey, splitIdxStr] = rawValue.split('::');
  const splitIdx = splitIdxStr != null ? parseInt(splitIdxStr) : null;
  const split = (splitIdx != null && FL_SPLITS[encarKey]) ? FL_SPLITS[encarKey][splitIdx] : null;
  state.selected = state.master.find(r => r._key === encarKey);
  state.selectedSplit = split;
  state.selectedPkgs.clear();
  $('status').textContent = '카탈로그 로딩…';
  // split.catalogId 가 있으면 그걸로 직접 로드, 없으면 encar 기반
  const cat = split?.catalogId ? await loadCatalogById(split.catalogId) : await loadCatalog(encarKey);
  if (!cat) {
    state.catalog = null;
    $('catalogPanel').style.display = 'none';
    $('emptyPanel').style.display = 'block';
    $('emptyMsg').textContent = `이 차종(${key})의 옵션 카탈로그가 아직 매핑 안 됨.`;
    $('status').textContent = '';
    $('status').classList.remove('ok');
    return;
  }
  state.catalog = cat;
  $('status').textContent = `${cat.title} | source: ${cat.source} | fetched: ${cat.fetched_at}`;
  $('status').classList.add('ok');
  // 가격표 링크 활성화
  const sourceUrl = (cat.source_urls || [])[0];
  const link = $('priceSheetLink');
  if (sourceUrl) {
    link.href = sourceUrl;
    const isWikicar = /wikicar/.test(sourceUrl);
    link.textContent = isWikicar ? '📄 시즌 가격표 보기 ↗' : '📄 제조사 가격표 ↗';
    link.style.display = 'inline-flex';
  } else {
    link.style.display = 'none';
  }
  $('emptyPanel').style.display = 'none';
  $('catalogPanel').style.display = 'block';
  // 트림 드롭다운 채우기 — sub_model 컨텍스트로 필터링
  const trimSel = $('trim');
  const allTrims = Object.keys(cat.trims);
  const filteredTrims = filterTrimsBySubContext(allTrims, state.selected, state.selectedSplit);
  trimSel.innerHTML = '';
  (filteredTrims.length ? filteredTrims : allTrims).forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    const tInfo = cat.trims[t] || {};
    const p = tInfo.price || {};
    const mainPrice = p.tax_5_after || p.tax_5_before || p.tax_5 || p.tax_3_5_after || p.tax_3_5_before || p.tax_3_5 || p.base || null;
    opt.textContent = mainPrice ? `${t} | ${(mainPrice/10000).toFixed(0)}만` : t;
    trimSel.appendChild(opt);
  });
  trimSel.disabled = false;
  state.activeTrim = (filteredTrims[0] || allTrims[0]);
  trimSel.value = state.activeTrim;
  state.filteredTrims = filteredTrims.length ? filteredTrims : allTrims;
  renderCatalog();
}

// sub_model 컨텍스트로 트림 필터 — 하이브리드 / 일렉트릭 / N 라인 / 영업용 / 장애인용 등
function filterTrimsBySubContext(trims, subRow, split) {
  if (!subRow) return trims;
  const subName = (split?.display || subRow.sub || '').toLowerCase();
  const isHEV  = /하이브리드|hybrid|hev/.test(subName);
  const isEV   = /일렉트릭|electric|ev|전기/.test(subName) && !/하이브리드/.test(subName);
  const isN    = /\bn\b|n라인|n 라인|n line|n-line/i.test(subName);
  const isCommercial = /영업용|렌터/.test(subName);
  const isHandicap = /장애/.test(subName);

  // 트림 분류 함수
  const trimKind = t => {
    const n = t.toLowerCase();
    if (/하이브리드|hybrid|hev/.test(n)) return 'hev';
    if (/일렉트릭|electric|\bev\b|전기/.test(n) || /^ev/i.test(t)) return 'ev';
    if (/n\s*라인|n\s*line|nline|n-line/.test(n) || t === 'N') return 'nline';
    if (/영업용|렌터/.test(n)) return 'commercial';
    if (/장애인|왼손|오른손|원발|오른발|양발/.test(n)) return 'handicap';
    return 'normal';
  };

  return trims.filter(t => {
    const k = trimKind(t);
    if (isHEV)        return k === 'hev';
    if (isEV)         return k === 'ev';
    if (isN)          return k === 'nline' || (subRow.model && /^아반떼\s*N$|^N\b/.test(subRow.model||''));
    if (isCommercial) return k === 'commercial';
    if (isHandicap)   return k === 'handicap';
    // 일반 sub_model: HEV/EV/N라인/영업용/장애인용 제외
    return k === 'normal';
  });
}

function onTrimChange() {
  if (!state.catalog) return;
  state.activeTrim = $('trim').value;
  state.selectedPkgs.clear();
  renderCatalog();
}

function resetCatalog() {
  state.selected = null;
  state.catalog = null;
  state.activeTrim = null;
  state.selectedPkgs.clear();
  $('trim').innerHTML = '<option>트림</option>';
  $('trim').disabled = true;
  $('catalogPanel').style.display = 'none';
  $('emptyPanel').style.display = 'block';
  $('emptyMsg').textContent = '차종을 선택하세요.';
  $('status').textContent = '';
  $('status').classList.remove('ok');
  $('trimBarWrap').classList.remove('visible');   // 트림 바 sticky 도 숨김
  $('trimBarWrap').innerHTML = '';
  state.fpOptions = new Set();
  $('fpOptionsSection').style.display = 'none';
  $('priceSheetLink').style.display = 'none';
}

function renderCatalog() {
  const cat = state.catalog;
  if (!cat) return;
  const allTrims = Object.keys(cat.trims);
  // sub_model 컨텍스트 필터 적용
  const trims = state.filteredTrims && state.filteredTrims.length ? state.filteredTrims : allTrims;
  state.activeTrim = state.activeTrim && trims.includes(state.activeTrim) ? state.activeTrim : trims[0];

  // 트림 chips bar — 변형 토큰(가솔린 3.8 / 디젤 2.2 9인승 등) 별로 그룹 짓고 한 줄씩 렌더
  const wrap = $('trimBarWrap');
  wrap.innerHTML = '';
  wrap.classList.add('visible');

  // 변형 패턴: 연료/배기량(X.X·R2.0)/인승(N인승) 중 먼저 매칭되는 토큰부터 끝까지
  const VARIANT_RE = /(가솔린|디젤|LPG|LPi|하이브리드|일렉트릭|EV|HEV|R\d\.\d|\d\.\d|\d+인승).*$/;
  const groups = new Map();
  for (const t of trims) {
    const m = t.match(VARIANT_RE);
    const v = m ? m[0].trim() : '';
    if (!groups.has(v)) groups.set(v, []);
    groups.get(v).push(t);
  }
  // 그룹이 1개뿐이면 라인 구분 안함 (단일 변형)
  const useGroups = groups.size > 1;

  function makeBtn(t) {
    const btn = document.createElement('button');
    btn.className = 'trim-btn' + (t === state.activeTrim ? ' active' : '');
    const tInfo = cat.trims[t];
    const p = tInfo.price || {};
    const mainPrice = p.tax_5_after || p.tax_5_before || p.tax_5 || p.tax_3_5_after || p.tax_3_5_before || p.tax_3_5 || p.base || null;
    const priceTxt = mainPrice ? `<span class="trim-price">${(mainPrice/10000).toFixed(0)}만</span>` : '';
    btn.innerHTML = `<span class="trim-name">${t}</span>${priceTxt}`;
    btn.addEventListener('click', () => {
      if (state.activeTrim !== t) state.selectedPkgs.clear();
      state.activeTrim = t;
      $('trim').value = t;
      renderCatalog();
    });
    return btn;
  }

  if (useGroups) {
    // 변형별 한 줄씩 — 각 그룹을 자체 row div 로 감쌈
    for (const [variant, list] of groups) {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;flex-basis:100%';
      for (const t of list) row.appendChild(makeBtn(t));
      wrap.appendChild(row);
    }
  } else {
    for (const t of trims) wrap.appendChild(makeBtn(t));
  }
  $('trim').value = state.activeTrim;

  const t = cat.trims[state.activeTrim];
  $('summary').innerHTML = `
    <span>총 옵션 <b>${Object.keys(cat.options).length}</b></span>
    <span>기본 <b>${t.basic.length}</b></span>
    <span>선택 <b>${t.select.length}</b></span>
    <span>패키지 그룹 <b>${t.select_groups.length}</b></span>
    <span>카테고리 <b>${Object.keys(cat.categories).length}</b></span>
  `;

  const content = $('trimContent');
  content.innerHTML = '';

  // 트림 기본가 — fallback 체인은 trim-btn 과 동일
  const priceObj = t.price || {};
  const basePrice = priceObj.tax_5_after || priceObj.tax_5_before || priceObj.tax_5
    || priceObj.tax_3_5_after || priceObj.tax_3_5_before || priceObj.tax_3_5
    || priceObj.base || 0;

  // 1) 선택 패키지 — 트림 바로 아래, 클릭 토글
  let pkgTotal = 0;
  let pkgPricedCount = 0;
  if (t.select_groups.length > 0) {
    const pkg = document.createElement('div');
    pkg.className = 'pkg-section';
    pkg.innerHTML = `<div class="pkg-title"><span>선택 패키지 (${t.select_groups.length}개)</span><span class="hint">클릭해서 추가</span></div><div class="pkg-grid"></div>`;
    const grid = pkg.querySelector('.pkg-grid');
    t.select_groups.forEach((group, idx) => {
      // 새 형식: { codes, price, name? }, 또는 옛 형식: [code, code]
      const codes = Array.isArray(group) ? group : (group.codes || []);
      const price = Array.isArray(group) ? null : group.price;
      const pkgName = !Array.isArray(group) && group.name ? group.name : null;
      const names = codes.map(c => cat.options[c]?.name || c);
      const isSelected = state.selectedPkgs.has(idx);
      if (isSelected && price) { pkgTotal += price; pkgPricedCount++; }
      // 의존성 — 다른 선택된 패키지 때문에 자동 해제 될 가능성 (시각적 표시만)
      let conflictWith = null;
      if (!isSelected && !Array.isArray(group)) {
        for (const selIdx of state.selectedPkgs) {
          const sel = t.select_groups[selIdx];
          if (Array.isArray(sel)) continue;
          // 같은 group 중복
          if (group.group && sel.group === group.group) { conflictWith = sel.name || `#${selIdx}`; break; }
          // sel.excludes 가 이 패키지 이름 포함
          if (sel.excludes && pkgName && sel.excludes.includes(pkgName)) { conflictWith = sel.name || `#${selIdx}`; break; }
          // 이 패키지의 excludes 가 sel 이름 포함
          if (group.excludes && sel.name && group.excludes.includes(sel.name)) { conflictWith = sel.name; break; }
        }
      }
      const div = document.createElement('div');
      div.className = 'pkg' + (isSelected ? ' selected' : '') + (conflictWith ? ' conflict' : '');
      if (conflictWith) {
        div.title = `「${conflictWith}」와 함께 선택 시 자동 해제됨`;
      }
      // 패키지 카드 — 헤더 (이름 + 가격) + FP chip 미니 + hover 시 옵션 list
      const stripParen = (s) => (s || '').replace(/\s*\([^)]*\)/g, '').replace(/\s+/g, ' ').trim();
      const cleanNames = names.map(stripParen);
      const cleanPkgName = stripParen(pkgName);
      const titleText = cleanPkgName || cleanNames[0] || '(패키지)';
      const head = `<div class="pkg-head">${titleText}${price ? ` <span class="pkg-price">${(price/10000).toFixed(0)}만</span>` : ''}</div>`;
      // FP 표준옵션 매핑 — 패키지명 + 옵션명들로 매핑된 ID 추출
      const fpIdsSet = new Set();
      matchFpByName(pkgName).forEach(id => fpIdsSet.add(id));
      for (const n of names) matchFpByName(n).forEach(id => fpIdsSet.add(id));
      const FP_LABELS = {};
      Object.values(OPTIONS).forEach(c => c.items.forEach(([id, name]) => { FP_LABELS[id] = name; }));
      const fpChips = [...fpIdsSet].slice(0, 8).map(id => `<span class="pkg-fp-chip" title="${id}">${FP_LABELS[id] || id}</span>`).join('');
      const fpChipBar = fpChips ? `<div class="pkg-fp-chips">${fpChips}${fpIdsSet.size > 8 ? `<span class="pkg-fp-chip">+${fpIdsSet.size - 8}</span>` : ''}</div>` : '';
      const body = (cleanNames.length && cleanNames[0] !== titleText)
        ? `<div class="pkg-items">${cleanNames.join(' · ')}</div>`
        : '';
      const conflictNote = conflictWith ? `<div class="conflict-with">⚠ 「${conflictWith}」와 배타 — 클릭 시 자동 교체</div>` : '';
      div.innerHTML = head + body + conflictNote;
      div.addEventListener('click', () => {
        // 옵션 의존성 — group 같은 것 자동 해제, excludes 명시적 배제
        if (!state.selectedPkgs.has(idx)) {
          // 새로 선택할 때만 — 같은 group 중 다른 것 해제
          if (group.group) {
            t.select_groups.forEach((g, i) => {
              if (i !== idx && (Array.isArray(g) ? null : g.group) === group.group) {
                state.selectedPkgs.delete(i);
              }
            });
          }
          // excludes 에 있는 다른 패키지 해제
          if (group.excludes && Array.isArray(group.excludes)) {
            t.select_groups.forEach((g, i) => {
              const gName = Array.isArray(g) ? '' : (g.name || '');
              if (i !== idx && group.excludes.includes(gName)) {
                state.selectedPkgs.delete(i);
              }
            });
          }
        }
        // toggle 자체
        if (state.selectedPkgs.has(idx)) state.selectedPkgs.delete(idx);
        else state.selectedPkgs.add(idx);
        renderCatalog();
      });
      grid.appendChild(div);
    });
    content.appendChild(pkg);
  }

  // 2) 가격 합계 — 트림 기본가 + 선택 패키지
  if (basePrice) {
    const total = basePrice + pkgTotal;
    const calc = document.createElement('div');
    calc.className = 'price-calc';
    const baseTxt = `${(basePrice/10000).toFixed(0)}만`;
    let extraTxt = '';
    if (state.selectedPkgs.size > 0) {
      if (pkgTotal > 0) {
        extraTxt = ` <span class="add">+ ${(pkgTotal/10000).toFixed(0)}만 (패키지 ${pkgPricedCount}개)</span>`;
        if (state.selectedPkgs.size > pkgPricedCount) {
          extraTxt += ` <span class="muted">+ 가격미상 ${state.selectedPkgs.size - pkgPricedCount}개</span>`;
        }
      } else {
        extraTxt = ` <span class="muted">+ 가격미상 ${state.selectedPkgs.size}개</span>`;
      }
    }
    calc.innerHTML = `
      <div class="breakdown">기본가 ${baseTxt}${extraTxt}</div>
      <div class="total"><span class="label">합계</span>${(total/10000).toFixed(0)}만원</div>
    `;
    content.appendChild(calc);
  }

  // 3) 카테고리별 표시 — 해당 트림에서 적용되는 옵션만 필터, but 적용 안 된 것도 흐리게 표시
  const catKeys = Object.keys(cat.categories).filter(k => k !== '선택사양');
  const basicSet = new Set(t.basic);
  const selectSet = new Set(t.select);
  catKeys.forEach(catName => {
    const codes = cat.categories[catName];
    const block = document.createElement('div');
    block.className = 'category-block';
    const applied = codes.filter(c => basicSet.has(c) || selectSet.has(c));
    block.innerHTML = `<div class="cat-title"><span>${catName}</span><span class="count">${applied.length} / ${codes.length}</span></div><div class="opt-grid"></div>`;
    const grid = block.querySelector('.opt-grid');
    codes.forEach(code => {
      const info = cat.options[code];
      const isBasic = basicSet.has(code);
      const isSelect = selectSet.has(code);
      const cls = isBasic ? 'basic' : (isSelect ? 'select' : '');
      const div = document.createElement('div');
      div.className = 'opt ' + cls;
      const badge = isBasic ? '' : (isSelect ? '<span class="badge">선택</span>' : '<span class="badge">미적용</span>');
      // 카테고리 옵션 list — 원본 그대로 표시 (괄호 안 핵심 정보 보존)
      div.innerHTML = `<span>${info.name}</span>${badge}`;
      grid.appendChild(div);
    });
    content.appendChild(block);
  });

  $('rawJson').textContent = JSON.stringify(cat, null, 2);

  // 제조사 옵션 카운트 (collapsible 헤더)
  const totalOpts = Object.keys(cat.options).length;
  $('manuCount').textContent = `(${t.basic.length + t.select.length} / ${totalOpts}, 패키지 ${t.select_groups.length})`;

  // 프리패스 표준 옵션 — 트림 시드에서 자동 프리필
  $('fpOptionsSection').style.display = 'block';
  prefillFpFromSeed();
  renderFpOptions();
}

async function init() {
  const data = await loadMaster();
  if (!data) {
    $('status').textContent = '⚠️ 프리패스 차종 매트릭스 로드 실패';
    $('status').classList.add('warn');
    return;
  }
  state.master = data;
  // catalog _index 단일 진실원 — master row 의 catalog_id 로 직접 매핑
  //  codeByEncar: row._key → chassis code (e.g., "RG3")
  //  titleByEncar: row._key → 메이커 prefix 제거한 full title (e.g., "디 올 뉴 G80 RG3")
  const idx = await loadIndex();
  state.codeByEncar = {};
  state.titleByEncar = {};
  const _extractCode = (title) => {
    const toks = (title || '').trim().split(/\s+/);
    for (let i = toks.length - 1; i >= 0; i--) {
      if (/^[A-Z][A-Z0-9]+$/.test(toks[i])) return toks[i];
    }
    return '';
  };
  for (const row of state.master) {
    const cat = idx[row.catalog_id];
    if (!cat) continue;
    const titleNoMaker = (cat.title || '').replace(new RegExp('^' + (cat.maker || '') + '\\s+'), '').trim();
    const code = _extractCode(cat.title);
    if (titleNoMaker) state.titleByEncar[row._key] = titleNoMaker;
    if (code) state.codeByEncar[row._key] = code;
  }
  $('status').textContent = `프리패스 차종 매트릭스 ${data.length}건 로드 완료. (자동 코드 매핑: ${Object.keys(state.codeByEncar).length}건)`;
  fillMakers();
  $('maker').addEventListener('change', onMakerChange);
  $('model').addEventListener('change', onModelChange);
  $('sub').addEventListener('change', onSubChange);
  $('trim').addEventListener('change', onTrimChange);

  // URL 파라미터 → 자동 선택 (?catalog=ID 또는 ?maker=&model=&sub=)
  try {
    const params = new URLSearchParams(location.search);
    const catalogId = params.get('catalog');
    const qMaker = params.get('maker');
    const qModel = params.get('model');
    const qSub = params.get('sub');

    let target = null;
    if (catalogId) {
      // catalog id 로 master 에서 매칭되는 행 찾기
      target = state.master.find(r => state.codeByEncar[r._key] === catalogId)
            || state.master.find(r => state.titleByEncar[r._key] && state.codeByEncar[r._key] === catalogId);
    }
    if (!target && (qMaker || qModel || qSub)) {
      target = state.master.find(r =>
        (!qMaker || r.maker === qMaker) &&
        (!qModel || r.model === qModel) &&
        (!qSub   || (r.sub || '').includes(qSub))
      );
    }
    if (target) {
      $('maker').value = target.maker;
      onMakerChange();
      setTimeout(() => {
        $('model').value = target.model;
        onModelChange();
        setTimeout(() => {
          // sub dropdown 의 첫 매칭 옵션 선택
          const subSel = $('sub');
          for (const opt of subSel.options) {
            if (opt.value && opt.value.startsWith(target._key)) {
              subSel.value = opt.value;
              onSubChange();
              break;
            }
          }
        }, 50);
      }, 50);
    }
  } catch (e) { console.warn('[matrix-deeplink]', e); }
  $('showYear').addEventListener('change', () => {
    if ($('model').value) onModelChange();   // sub dropdown 다시 그림
  });
  $('rawToggle').addEventListener('click', () => {
    const pre = $('rawJson');
    pre.style.display = pre.style.display === 'none' ? 'block' : 'none';
    $('rawToggle').textContent = pre.style.display === 'none' ? '▾ 원본 JSON 보기' : '▴ 원본 JSON 숨기기';
  });
  $('manuToggle').addEventListener('click', () => {
    const w = $('manuWrap');
    w.classList.toggle('open');
    $('manuChevron').textContent = w.classList.contains('open') ? '▴' : '▾';
  });
  $('fpAllToggle').addEventListener('click', () => {
    const w = $('fpAllWrap');
    w.classList.toggle('open');
    $('fpChevron').textContent = w.classList.contains('open') ? '▴' : '▾';
  });
  // 가격표 모달
  $('priceSheetLink').addEventListener('click', (e) => {
    e.preventDefault();
    if (!state.catalog) return;
    $('priceModalTitle').textContent = `📄 ${state.catalog.title} — 가격표`;
    $('priceModalBody').innerHTML = buildPriceTable(state.catalog);
    const srcUrl = (state.catalog.source_urls || [])[0] || '#';
    $('priceModalSource').href = srcUrl;
    $('priceModalSource').style.display = srcUrl !== '#' ? 'inline' : 'none';
    $('priceModalFooter').textContent = `source: ${state.catalog.source} · fetched: ${state.catalog.fetched_at}`;
    $('priceModal').style.display = 'flex';
  });
  $('priceModalClose').addEventListener('click', () => {
    $('priceModal').style.display = 'none';
  });
  $('priceModal').addEventListener('click', (e) => {
    if (e.target === $('priceModal')) $('priceModal').style.display = 'none';
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && $('priceModal').style.display === 'flex') {
      $('priceModal').style.display = 'none';
    }
  });
}

init();
</script>
