<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>프리패스 차종 매트릭스</title>
<!-- 로컬 file:// 와 Vercel 양쪽 호환 — 둘 다 시도하고 먼저 성공하는 쪽으로 -->
<script src="./public/data/encar-master-seed.js" onerror="this.dataset.failed=1"></script>
<script src="./data/encar-master-seed.js" onerror="this.dataset.failed=1"></script>
<script src="./public/data/car-master/_bundle.js" onerror="this.dataset.failed=1"></script>
<script src="./data/car-master/_bundle.js" onerror="this.dataset.failed=1"></script>
<script src="./public/data/trim-options-seed.js" onerror="this.dataset.failed=1"></script>
<script src="./data/trim-options-seed.js" onerror="this.dataset.failed=1"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  /* 페이지 세로 스크롤바 항상 자리 확보 — 트림 변경 시 좌우 흔들림 방지 */
  html{scrollbar-gutter:stable;overflow-y:scroll}
  body{font-family:system-ui,-apple-system,sans-serif;font-size:12px;background:#f8fafc;color:#111827;padding:20px;max-width:1200px;margin:0 auto}
  h1{font-size:14px;font-weight:600;margin-bottom:14px}
  .panel{background:#fff;border:1px solid #e5e7eb;border-radius:4px;padding:16px;margin-bottom:12px}
  .selector-row{display:grid;grid-template-columns:1fr 1.2fr 2fr 1.4fr;gap:6px;margin-bottom:8px}
  select{padding:8px 10px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;font-family:inherit;background:#fff;color:#111827}
  select:disabled{background:#f3f4f6;color:#9ca3af}
  .meta{font-size:11px;color:#6b7280;margin-top:4px}
  .meta.warn{color:#dc2626}
  .meta.ok{color:#059669}
  .trim-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .trim-btn{padding:10px 14px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit;color:#111827;display:inline-flex;flex-direction:column;align-items:flex-start;gap:3px;line-height:1.3;transition:all .15s;min-width:90px}
  .trim-btn .trim-name{font-size:12px;font-weight:500}
  .trim-btn .trim-price{font-size:11px;color:#6b7280;font-variant-numeric:tabular-nums}
  .trim-btn.active{background:#111827;color:#fff;border-color:#111827}
  .trim-btn.active .trim-price{color:#9ca3af}
  .trim-btn:hover:not(.active){background:#eff6ff;border-color:#3b82f6}
  .summary{display:flex;gap:18px;font-size:11px;color:#6b7280;margin-bottom:14px}
  .summary b{color:#111827;font-weight:500}
  .category-block{margin-bottom:14px}
  .cat-title{font-size:12px;color:#6b7280;font-weight:500;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between}
  .cat-title .count{color:#9ca3af}
  .opt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px 18px}
  .opt{padding:5px 0;font-size:12px;line-height:1.4;color:#9ca3af;display:flex;align-items:flex-start;gap:6px}
  .opt.basic{color:#111827}
  .opt.select{color:#6b7280}
  .opt::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:#d1d5db;margin-top:6px;flex-shrink:0}
  .opt.basic::before{background:#111827}
  .opt.select::before{background:#6b7280}
  .opt .badge{display:inline-block;font-size:10px;color:#9ca3af;padding:1px 4px;border:1px solid #e5e7eb;border-radius:2px;margin-left:6px;flex-shrink:0}
  .opt.select .badge{color:#6b7280}
  .pkg-section{margin-bottom:14px}
  .pkg-title{font-size:12px;color:#6b7280;font-weight:500;margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline}
  .pkg-title .hint{font-size:10px;color:#9ca3af;font-weight:400}
  .pkg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px}
  .pkg{padding:8px 10px;border:1px solid #e5e7eb;border-radius:4px;background:#fafafa;cursor:pointer;transition:background .1s,border-color .1s;user-select:none}
  .pkg:hover{background:#f3f4f6;border-color:#d1d5db}
  .pkg.selected{background:#eff6ff;border-color:#3b82f6}
  .pkg.selected .pkg-head, .pkg.selected .pkg-name{color:#1e40af}
  .pkg.disabled{opacity:.5;cursor:not-allowed}
  .pkg .pkg-head{font-size:11px;color:#111827;font-weight:500;display:flex;justify-content:space-between;gap:8px;margin-bottom:4px}
  .pkg .pkg-name{font-size:11px;color:#111827;line-height:1.3;font-weight:500;display:flex;justify-content:space-between;gap:8px}
  .pkg .pkg-price{color:#dc2626;font-variant-numeric:tabular-nums;flex-shrink:0}
  .pkg .pkg-items{font-size:10px;color:#6b7280;line-height:1.4}
  .price-calc{display:flex;justify-content:space-between;align-items:baseline;padding:12px 14px;background:#fff;border:1px solid #e5e7eb;border-radius:4px;margin-bottom:14px}
  .price-calc .breakdown{font-size:11px;color:#6b7280;font-variant-numeric:tabular-nums}
  .price-calc .breakdown .add{color:#3b82f6;margin-left:8px}
  .price-calc .breakdown .muted{color:#9ca3af}
  .price-calc .total{font-size:15px;font-weight:600;color:#111827;font-variant-numeric:tabular-nums}
  .price-calc .total .label{font-size:11px;color:#6b7280;font-weight:400;margin-right:6px}
  .empty{font-size:11px;color:#9ca3af;padding:60px 0;text-align:center}
  /* catalogPanel: 자체 스크롤 X — body 단일 스크롤. sticky 헤더로 트림 바 고정 */
  #catalogPanel{min-height:520px}
  #emptyPanel{min-height:520px;display:flex;align-items:center;justify-content:center}
  .raw-toggle{font-size:11px;color:#6b7280;cursor:pointer;text-decoration:underline;margin-top:14px}
  pre{background:#f9fafb;border:1px solid #e5e7eb;border-radius:4px;padding:10px;font-size:11px;overflow:auto;max-height:400px;margin-top:8px;white-space:pre-wrap}
  /* ─── 프리패스 표준 옵션 (95개) ─── */
  #fpOptionsSection{margin-top:20px;padding-top:18px;border-top:2px solid #e5e7eb}
  #fpOptionsSection h3{font-size:13px;font-weight:600;color:#111827;margin:0}
  .popular-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:8px}
  .pop-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;background:#fff;transition:all .15s}
  .pop-card:hover{border-color:#3b82f6}
  .pop-card.has{border-color:#3b82f6;background:#eff6ff}
  .pop-card .icon{width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:#cbd5e1}
  .pop-card.has .icon{color:#3b82f6}
  .pop-card .lbl{font-size:11px;color:#94a3b8;text-align:center;line-height:1.3}
  .pop-card.has .lbl{color:#0f172a;font-weight:500}
  .pop-sub-section{margin-top:12px;padding-top:10px;border-top:1px dashed #e5e7eb}
  .pop-sub-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:11px;color:#94a3b8;font-weight:500}
  .popular-sub-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .pop-card-sm{display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 4px;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer;background:#fff}
  .pop-card-sm:hover{border-color:#3b82f6}
  .pop-card-sm.has{border-color:#3b82f6;background:#eff6ff}
  .pop-card-sm .icon{width:18px;height:18px;color:#cbd5e1}
  .pop-card-sm.has .icon{color:#3b82f6}
  .pop-card-sm .lbl{font-size:10px;color:#94a3b8;text-align:center}
  .pop-card-sm.has .lbl{color:#0f172a;font-weight:500}
  .fp-all-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 0;margin-top:12px;border-top:1px solid #e5e7eb;color:#475569;font-size:12px;font-weight:500}
  .fp-all-toggle:hover{color:#3b82f6}
  .fp-all-toggle b{color:#3b82f6}
  #fpAllWrap{display:none;margin-top:8px}
  #fpAllWrap.open{display:block}
  .fp-cat-block{margin-bottom:14px}
  .fp-cat-title{font-size:12px;color:#374151;font-weight:600;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between}
  .fp-cat-title .count{color:#3b82f6}
  .fp-opt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px 18px}
  .fp-opt{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;color:#94a3b8;cursor:pointer}
  .fp-opt.has{color:#0f172a}
  .fp-opt input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#3b82f6}
  .fp-opt label{cursor:pointer;flex:1;line-height:1.3}
  .fp-opt-uncertain.has{background:#fffbeb;border-radius:3px;padding:4px 6px;margin:-3px -6px;color:#0f172a}
  .fp-opt-uncertain.has label::after{content:" ⚠";color:#d97706;font-weight:600}
  .fp-opt-badge{display:inline-block;padding:1px 5px;background:#fef3c7;color:#92400e;border-radius:3px;font-size:9px;font-weight:600;margin-left:4px}
  /* 제조사 옵션 펼치기/접기 wrap */
  #manuWrap{display:none}
  #manuWrap.open{display:block}
  /* 상단 selector + 트림 bar 한 묶음 sticky — 묶음 자체가 박스로 고정 */
  #stickyZone{position:sticky;top:0;z-index:50;background:#f8fafc;padding-bottom:6px;margin-bottom:12px;box-shadow:0 4px 8px -4px rgba(0,0,0,.08)}
  #stickyZone #selectorPanel{margin-bottom:0;background:#fff;border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom:none;padding-bottom:10px}
  #trimBarWrap{background:#fff;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 4px 4px;padding:12px 16px;display:none;gap:8px}
  #trimBarWrap.trim-bar{margin-bottom:0}
  #trimBarWrap.visible{display:flex;flex-wrap:wrap}
  /* catalogPanel 내부의 trimBar 는 숨기고 위에 고정된 trimBarWrap 사용 */
  #catalogPanel .trim-bar{display:none}
  /* 패널 외부 영역 흰 배경 안 보이게 */
  body{background:#f8fafc}
</style>
</head>
<body>

<h1>프리패스 차종 매트릭스 <span style="font-size:11px;font-weight:400;color:#9ca3af;margin-left:6px">트림 × 옵션 × 패키지</span></h1>

<!-- selector + 트림 bar 묶음 sticky (한 박스로 위에 고정) -->
<div id="stickyZone">
  <div class="panel" id="selectorPanel">
    <div class="selector-row">
      <select id="maker" disabled><option>제조사 로딩중…</option></select>
      <select id="model" disabled><option>모델</option></select>
      <select id="sub" disabled><option>세부모델</option></select>
      <select id="trim" disabled><option>트림</option></select>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
      <label style="font-size:11px;color:#6b7280;cursor:pointer;display:inline-flex;align-items:center;gap:4px">
        <input type="checkbox" id="showYear" checked style="margin:0">
        세부모델에 생산기간 표시
      </label>
    </div>
    <div class="meta" id="status">프리패스 차종 매트릭스 로딩…</div>
  </div>
  <!-- 트림 bar (selector 아래 같은 sticky 묶음) -->
  <div id="trimBarWrap" class="trim-bar"></div>
</div>

<div class="panel" id="catalogPanel" style="display:none">
  <div class="trim-bar" id="trimBar"></div>
  <div class="summary" id="summary"></div>
  <div class="fp-all-toggle" id="manuToggle" style="margin-top:0;border-top:none">
    <span><b id="manuLabel">제조사 옵션</b> <span style="color:#9ca3af" id="manuCount"></span></span>
    <span id="manuChevron">▴</span>
  </div>
  <div id="manuWrap" class="open"><div id="trimContent"></div></div>

  <!-- ─── 프리패스 표준 옵션 (95개) ─── -->
  <div id="fpOptionsSection" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">
      <h3>프리패스 표준 옵션</h3>
      <span id="popSummary" style="font-size:11px;color:#6b7280">0 / 10</span>
    </div>
    <div class="popular-grid" id="popularGrid"></div>
    <div class="pop-sub-section">
      <div class="pop-sub-header">
        <span>알면 좋을만한 옵션</span>
        <span id="popSubSummary">0 / 7</span>
      </div>
      <div class="popular-sub-grid" id="popularSubGrid"></div>
    </div>
    <div class="fp-all-toggle" id="fpAllToggle">
      <span><b id="fpTotalSummary">0 / 95</b>개 세부옵션 모두보기</span>
      <span id="fpChevron">▾</span>
    </div>
    <div id="fpAllWrap">
      <div id="fpCategories"></div>
      <div style="margin-top:14px;padding:10px 12px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;font-size:11px;color:#6b7280;line-height:1.5">
        <b style="color:#374151">세부옵션 유의사항</b><br>
        위 정보는 제조사에서 제공하는 출고시 옵션을 기준으로 작성되었습니다.
        일부 표출되지 않거나 실제 차량 정보와 차이가 있을 수 있으니,
        출고 전 업체 상담을 통해 정확한 옵션 사항을 확인 바랍니다.
      </div>
    </div>
  </div>

  <div class="raw-toggle" id="rawToggle">▾ 원본 JSON 보기</div>
  <pre id="rawJson" style="display:none"></pre>
</div>

<div class="panel" id="emptyPanel">
  <div class="empty" id="emptyMsg">차종을 선택하세요.</div>
</div>

<script>
const $ = id => document.getElementById(id);
const state = {
  master: [],
  selected: null,        // 프리패스 차종 매트릭스 row
  catalog: null,         // car-options-catalog JSON
  activeTrim: null,
  selectedPkgs: new Set(), // 선택한 패키지 인덱스
  fpOptions: new Set()   // 프리패스 표준 옵션 ID 셋
};

/* ─── 프리패스 표준 옵션 마스터 (95개) ─── */
const OPTIONS = {
  exterior: { label:'외관', items: [
    ['SUNROOF','썬루프(일반)','opt'],['SUNROOF_PANO','파노라마 썬루프','opt'],['SUNROOF_SAFETY','세이프티 썬루프','opt'],
    ['HEAD_LED','LED 헤드램프'],['HEAD_HID','제논 헤드램프(HID)','unc'],['POSITION_LED','LED 포지션램프'],
    ['DRL','주간 주행등'],['HEAD_ESCORT','에스코트 헤드램프','unc'],
    ['MIRROR_FOLD','전동접이 사이드미러'],['MIRROR_ADJ','전동조절 사이드미러','unc'],
    ['ROOF_RACK','루프랙','unc'],['ALUMINUM_WHEEL','알루미늄휠'],
    ['FOG_LED','안개등 (LED)'],['REAR_LED_COMBI','LED 리어 콤비네이션 램프']
  ]},
  interior: { label:'내장', items: [
    ['CRUISE','크루즈컨트롤'],['STR_REMOTE','스티어링 휠 리모컨'],
    ['AUTO_LIGHT','오토 라이트 컨트롤'],['POWER_STR','파워 스티어링'],
    ['HANDS_FREE','핸즈프리'],['HEAT_STR','열선 스티어링휠','unc'],
    ['POWER_SEAT_DR','전동시트(운전석)'],['POWER_SEAT_PS','전동시트(동승석)','unc'],
    ['MEMORY_SEAT_DR','메모리시트(운전석)','unc'],['MEMORY_SEAT_PS','메모리시트(동승석)','opt'],
    ['HEAT_SEAT_FRONT','열선시트(앞좌석)'],['HEAT_SEAT_REAR','열선시트(뒷좌석)','unc'],
    ['VENT_SEAT_DR','통풍시트(운전석)','unc'],['VENT_SEAT_PS','통풍시트(동승석)','unc'],
    ['SEAT_LEATHER','가죽시트'],['SEAT_FABRIC','직물 시트'],['SEAT_MIX','직물+가죽 시트'],
    ['ECM_MIRROR','ECM룸미러'],
    ['ECM_HIPASS_RV','ECM룸미러(하이패스+리어뷰내장)','unc'],
    ['ECM_HIPASS_MTS','ECM룸미러(하이패스+MTS내장)','unc'],
    ['HIPASS_MIRROR','하이패스 룸미러'],['REAR_MIRROR','후방 룸미러'],
    ['MTS_E_MIRROR','전자식 룸미러(MTS)','opt']
  ]},
  safety: { label:'안전', items: [
    ['AIRBAG_DR','에어백(운전석)'],['AIRBAG_PS','에어백(동승석)'],
    ['AIRBAG_SIDE','에어백(사이드)'],['AIRBAG_KNEE','에어백(무릎보호)','unc'],
    ['CAM_REAR','후방 카메라'],['SENSOR_REAR','후방 감지센서'],
    ['CAM_FRONT','전방 카메라','unc'],['SENSOR_FRONT','전방 감지센서','unc'],
    ['AVMS','어라운드 뷰 (AVMS)','unc'],['SPAS','주차 조향 보조 시스템 (SPAS)','unc'],
    ['FOOT_PARKING','풋파킹 브레이크'],['EPB','전자식 파킹 브레이크'],
    ['ABS','ABS'],['BAS','제동 도움 장치(BAS)'],
    ['AEB','자동 긴급 제동 시스템 (AEB)','unc'],['VDC','차체자세제어 (VDC/VSM/ESC/ESP)'],
    ['TCS','미끄럼방지 (TCS)'],['ESS','급제동 경보 (ESS)'],
    ['TPMS','타이어 공기압감지 (TPMS)'],['HDA','고속도로 주행 지원시스템 (HDA)','unc'],
    ['LDWS','차선이탈 경보 (LDWS)','unc'],['LKAS','차선 유지 보조 (LKAS)','unc'],
    ['DAW','운전자 주의 경고 (DAW)','unc'],['FCWS','전방 추돌 경보 (FCWS)','unc'],
    ['DBC','경사로 저속주행 (DBC)','unc'],['ECS','전자제어 서스펜션 (ECS/ALS)','opt'],
    ['HUD','헤드업 디스플레이 (HUD)','opt'],['RCTA','후측방 경보시스템 (RCTA)','unc'],
    ['HAC','경사로 밀림방지 (HAC)']
  ]},
  convenience: { label:'편의', items: [
    ['NAVIGATION','내비게이션'],['HIPASS','하이패스','unc'],
    ['BLACKBOX','블랙박스 (사후장착)','opt'],['BUILTIN_CAM','빌트인캠 (정품)','unc'],
    ['BUTTON_START','버튼 시동'],['SMART_KEY','스마트키'],
    ['REMOTE_LOCK','무선 도어 잠금장치'],['REMOTE_START','원격시동','unc'],
    ['AUTO_AC','자동 에어컨'],['AUTO_AC_REAR','자동 에어컨 (뒷좌석)','unc'],['MANUAL_AC','매뉴얼 에어컨'],

function fpToggle(id) {
  if (state.fpOptions.has(id)) state.fpOptions.delete(id);
  else state.fpOptions.add(id);
  renderFpOptions();
}

function renderFpOptions() {
  // 주요옵션 카드
  const grid = $('popularGrid');
  if (!grid) return;
  grid.innerHTML = '';
  let popCnt = 0;
  POPULAR_OPTIONS.forEach(([id, label, icon]) => {
    const has = state.fpOptions.has(id);
    if (has) popCnt++;
    const div = document.createElement('div');
    div.className = 'pop-card' + (has ? ' has' : '');
    div.innerHTML = `<div class="icon"><i data-lucide="${icon}" style="width:26px;height:26px"></i></div><div class="lbl">${label}</div>`;
    div.addEventListener('click', () => fpToggle(id));
    grid.appendChild(div);
  });
  $('popSummary').textContent = `${popCnt} / ${POPULAR_OPTIONS.length}`;

  // 알면 좋을만한 옵션
  const subGrid = $('popularSubGrid');
  subGrid.innerHTML = '';
  let subCnt = 0;
  SUB_POPULAR_OPTIONS.forEach(([id, label, icon]) => {
    const has = state.fpOptions.has(id);
    if (has) subCnt++;
    const div = document.createElement('div');
    div.className = 'pop-card-sm' + (has ? ' has' : '');
    div.innerHTML = `<div class="icon"><i data-lucide="${icon}" style="width:16px;height:16px"></i></div><div class="lbl">${label}</div>`;
    div.addEventListener('click', () => fpToggle(id));
    subGrid.appendChild(div);
  });
  $('popSubSummary').textContent = `${subCnt} / ${SUB_POPULAR_OPTIONS.length}`;

  // 전체 95개 카테고리별
  const cats = $('fpCategories');
  cats.innerHTML = '';
  let totalCnt = 0;
  Object.values(OPTIONS).forEach(cat => {
    const cnt = cat.items.filter(([id]) => state.fpOptions.has(id)).length;
    totalCnt += cnt;
    const div = document.createElement('div');
    div.className = 'fp-cat-block';
    div.innerHTML = `
      <div class="fp-cat-title">${cat.label} <span class="count">${cnt} / ${cat.items.length}</span></div>
      <div class="fp-opt-grid">${cat.items.map(([id, name, kind]) => {
        const checked = state.fpOptions.has(id);
        const cls = ['fp-opt'];
        if (checked) cls.push('has');
        if (kind === 'unc') cls.push('fp-opt-uncertain');
        const badge = kind === 'opt' ? '<span class="fp-opt-badge">선택</span>' : '';
        return `<div class="${cls.join(' ')}"><input type="checkbox" id="fp-${id}" ${checked ? 'checked' : ''} data-id="${id}"><label for="fp-${id}">${name}${badge}</label></div>`;
      }).join('')}</div>`;
    cats.appendChild(div);
  });
  cats.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => fpToggle(cb.dataset.id));
  });
  $('fpTotalSummary').textContent = `${totalCnt} / ${FP_TOTAL}`;
  if (window.lucide && lucide.createIcons) lucide.createIcons();
}

// 카탈로그 옵션 이름으로 FP 옵션 ID 찾기
function matchFpByName(name) {
  if (!name) return null;
  const n = _normName(name);
  if (FP_NAME_MAP[n]) return FP_NAME_MAP[n];
  // FP_NAME_MAP 부분 일치 (긴 키 우선)
  const keys = Object.keys(FP_NAME_MAP).sort((a, b) => b.length - a.length);
  for (const k of keys) {
    if (k.length >= 3 && n.includes(k)) return FP_NAME_MAP[k];
  }
  // 95 옵션 라벨로 fallback
  for (const cat of Object.values(OPTIONS)) {
    for (const [id, label] of cat.items) {
      const nl = _normName(label.replace(/<[^>]+>/g, ''));
      if (nl.length >= 4 && (n === nl || n.includes(nl) || nl.includes(n))) return id;
    }
  }
  return null;
}

function matchCatalogToFp(catalog, trimName) {
  const matched = new Set();
  const t = catalog.trims[trimName];
  if (!t || !Array.isArray(t.basic)) return matched;
  for (const optId of t.basic) {
    const info = catalog.options[optId];
    if (!info) continue;
    const fpId = matchFpByName(info.name);
    if (fpId) matched.add(fpId);
  }
  return matched;
}

function prefillFpFromSeed() {
  state.fpOptions = new Set();
  if (!state.selected || !state.activeTrim) return;
  // 1순위: 카탈로그 (제조사 실데이터)
  if (state.catalog) {
    const matched = matchCatalogToFp(state.catalog, state.activeTrim);
    matched.forEach(id => state.fpOptions.add(id));
  }
  // 2순위: AI 시드 (카탈로그 못 잡은 옵션 보완)
  const seed = window.TRIM_OPTIONS_SEED?.[state.selected._key]?.trims?.[state.activeTrim];
  if (Array.isArray(seed)) seed.forEach(id => state.fpOptions.add(id));
}

// 그랜저 HG 출시(2011-01)가 컷오프. 그 이전 출시 모델 제외
// 세부모델 표기 정규화 — 괄호 제거 + 메이커별 N세대 → 개발코드 통일
const GEN_CODE_MAP = {
  '기아': {
    'K5': { '3세대': 'DL3', '2세대': 'JF' },
    'K9': { '2세대': 'RJ' },
    '카니발': { '4세대': 'KA4' },
    '스포티지': { '5세대': 'NQ5' },
    '쏘렌토': { '4세대': 'MQ4' },
    '셀토스': { '2세대': 'SP3' },
    'K3': { '2세대': 'BD' }
  }
};
// 제네시스는 sub 에 코드명 거의 없음 → 모델별 기본 코드 부여
const GENESIS_DEFAULT_CODE = {
  'G70': 'IK',
  'G80': 'RG3',     // RG3 = 현재 / DH = 이전
  'G90': 'RS4',     // RS4 = 현재 / RS3 = 이전 (EQ900)
  'GV60': 'JW',
  'GV70': 'JK1',
  'GV80': 'JX1'
};
function normalizeSub(row) {
  let s = (row.sub || '').replace(/\s*\(([^)]+)\)/g, ' $1').replace(/\s+/g, ' ').trim();
  // 1) 기아 N세대 → 코드
  const codes = GEN_CODE_MAP[row.maker]?.[row.model];
  if (codes) {
    for (const [gen, code] of Object.entries(codes)) {
      s = s.replace(new RegExp(gen + '\\b', 'g'), code);
    }
  }
  // 2) 제네시스: 코드 없으면 기본 코드 부여 + 이전 세대 구분
  if (row.maker === '제네시스') {
    const defaultCode = GENESIS_DEFAULT_CODE[row.model];
    if (defaultCode && !/[A-Z]+\d+|RJ|JF|DH|RS3/i.test(s)) {
      // 이전 세대 식별 (production_start 로): G80 2017 = DH, G90 2017 = RS3
      const ps = row.production_start || '';
      let codeUsed = defaultCode;
      if (row.model === 'G80' && ps < '2020-01') codeUsed = 'DH';
      else if (row.model === 'G90' && ps < '2022-01') codeUsed = 'RS3';
      s = s.replace(new RegExp('\\b' + row.model + '\\b'), row.model + ' ' + codeUsed).replace(/\s+/g, ' ');
    }
  }
  return s;
}

function withinScope(row) {
  const ps = row.production_start || '';
  return ps >= '2011-01';
}

async function loadMaster() {
  if (Array.isArray(window.ENCAR_MASTER) && window.ENCAR_MASTER.length) {

      .filter(withinScope);

}

const _cb = () => '?t=' + Date.now();
async function loadIndex() {
  // 1) script 태그로 로드된 window.CAR_MASTER_INDEX (file:// 더블클릭 OK)
  if (window.CAR_MASTER_INDEX) return window.CAR_MASTER_INDEX;
  // 2) fetch fallback (Vite dev 서버 환경)
  const candidates = [
    '/data/car-master/_index.json',
    './public/data/car-master/_index.json',
    'public/data/car-master/_index.json'
  ];
  for (const url of candidates) {
    try {
      const res = await fetch(url + _cb(), { cache: 'no-store' });
      if (res.ok) return await res.json();
    } catch {}
  }
  return {};
}

async function loadCatalog(encarKey) {
  const idx = await loadIndex();
  // _index 의 source.encar 에서 encarKey 찾아서 catalog_id 매핑
  const entry = Object.values(idx).find(v => (v.source?.encar || []).includes(encarKey));
  if (!entry) return null;
  // 1) script 로드된 번들에서
  if (window.CAR_MASTER && window.CAR_MASTER[entry.id]) return window.CAR_MASTER[entry.id];
  // 2) fetch fallback
  const candidates = [
    `/data/car-master/${entry.id}.json`,
    `./public/data/car-master/${entry.id}.json`,
    `public/data/car-master/${entry.id}.json`
  ];
  for (const url of candidates) {
    try {
      const res = await fetch(url + _cb(), { cache: 'no-store' });
      if (res.ok) return await res.json();
    } catch {}
  }
  return null;
}

  const modelCounts = {};
  state.master.filter(r => r.maker === m).forEach(r => {
    if (r.model) modelCounts[r.model] = (modelCounts[r.model]||0) + 1;
  });
  const models = Object.keys(modelCounts).sort((a,b) => {
    const cd = modelCounts[b] - modelCounts[a];
    return cd !== 0 ? cd : a.localeCompare(b,'ko');
  });
  models.forEach(mod => {
    const opt = document.createElement('option');
    opt.value = mod; opt.textContent = mod;
    sel.appendChild(opt);
  });
  sel.disabled = false;
  $('sub').innerHTML = '<option>세부모델</option>'; $('sub').disabled = true;
  $('trim').innerHTML = '<option>트림</option>'; $('trim').disabled = true;
  resetCatalog();
}

function onModelChange() {
  const maker = $('maker').value;
  const model = $('model').value;
  const sel = $('sub');
  sel.innerHTML = '<option value="">세부모델</option>';
  if (!model) { sel.disabled = true; resetCatalog(); return; }
  const subs = state.master.filter(r => r.maker === maker && r.model === model);
  subs.sort((a,b) => (b.production_start||'').localeCompare(a.production_start||''));
  subs.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r._key;
    const yr = (r.production_start||'').slice(0,4) + '~' + ((r.production_end||'').slice(0,4) || '현재');
    const showYear = $('showYear')?.checked;
    opt.textContent = showYear ? `${normalizeSub(r)} (${yr})` : normalizeSub(r);
    sel.appendChild(opt);
  });
  sel.disabled = false;
  $('trim').innerHTML = '<option>트림</option>'; $('trim').disabled = true;
  resetCatalog();
}

async function onSubChange() {
  const key = $('sub').value;
  if (!key) { resetCatalog(); return; }
  state.selected = state.master.find(r => r._key === key);
  state.selectedPkgs.clear();
  $('status').textContent = '카탈로그 로딩…';
  const cat = await loadCatalog(key);
  if (!cat) {
    state.catalog = null;
    $('catalogPanel').style.display = 'none';
    $('emptyPanel').style.display = 'block';
    $('emptyMsg').textContent = `이 차종(${key})의 옵션 카탈로그가 아직 매핑 안 됨.`;
    $('status').textContent = '';
    $('status').classList.remove('ok');
    return;
  }
  state.catalog = cat;
  $('status').textContent = `${cat.title} | source: ${cat.source} | fetched: ${cat.fetched_at}`;
  $('status').classList.add('ok');
  $('emptyPanel').style.display = 'none';
  $('catalogPanel').style.display = 'block';
  // 트림 드롭다운 채우기
  const trimSel = $('trim');
  const trims = Object.keys(cat.trims);
  trimSel.innerHTML = '';
  trims.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    trimSel.appendChild(opt);
  });
  trimSel.disabled = false;
  state.activeTrim = trims[0];
  trimSel.value = state.activeTrim;
  renderCatalog();
}

function onTrimChange() {
  if (!state.catalog) return;
  state.activeTrim = $('trim').value;
  state.selectedPkgs.clear();
  renderCatalog();
}

function resetCatalog() {
  state.selected = null;
  state.catalog = null;
  state.activeTrim = null;
  state.selectedPkgs.clear();
  $('trim').innerHTML = '<option>트림</option>';
  $('trim').disabled = true;
  $('catalogPanel').style.display = 'none';
  $('emptyPanel').style.display = 'block';
  $('emptyMsg').textContent = '차종을 선택하세요.';
  $('status').textContent = '';
  $('status').classList.remove('ok');
  $('trimBarWrap').classList.remove('visible');   // 트림 바 sticky 도 숨김
  $('trimBarWrap').innerHTML = '';
  state.fpOptions = new Set();
  $('fpOptionsSection').style.display = 'none';
}

function renderCatalog() {
  const cat = state.catalog;
  if (!cat) return;
  const trims = Object.keys(cat.trims);
  state.activeTrim = state.activeTrim && trims.includes(state.activeTrim) ? state.activeTrim : trims[0];

  // 트림 바 — sticky wrap (페이지 상단 고정) 에 렌더, 내부 trimBar 는 빈 채로 둠
  const wrap = $('trimBarWrap');
  wrap.innerHTML = '';
  wrap.classList.add('visible');
  trims.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'trim-btn' + (t === state.activeTrim ? ' active' : '');
    const tInfo = cat.trims[t];
    const p = tInfo.price || {};
    const mainPrice = p.tax_5_after || p.tax_5_before || p.tax_5 || p.tax_3_5_after || p.tax_3_5_before || p.tax_3_5 || p.base || null;
    const priceTxt = mainPrice ? `<span class="trim-price">${(mainPrice/10000).toFixed(0)}만</span>` : '';
    btn.innerHTML = `<span class="trim-name">${t}</span>${priceTxt}`;
    btn.addEventListener('click', () => {
      if (state.activeTrim !== t) state.selectedPkgs.clear();
      state.activeTrim = t;
      $('trim').value = t;
      renderCatalog();
    });
    wrap.appendChild(btn);
  });
  $('trim').value = state.activeTrim;

  const t = cat.trims[state.activeTrim];
  $('summary').innerHTML = `
    <span>총 옵션 <b>${Object.keys(cat.options).length}</b></span>
    <span>기본 <b>${t.basic.length}</b></span>
    <span>선택 <b>${t.select.length}</b></span>
    <span>패키지 그룹 <b>${t.select_groups.length}</b></span>
    <span>카테고리 <b>${Object.keys(cat.categories).length}</b></span>
  `;

  const content = $('trimContent');
  content.innerHTML = '';

  // 트림 기본가 — fallback 체인은 trim-btn 과 동일
  const priceObj = t.price || {};
  const basePrice = priceObj.tax_5_after || priceObj.tax_5_before || priceObj.tax_5
    || priceObj.tax_3_5_after || priceObj.tax_3_5_before || priceObj.tax_3_5
    || priceObj.base || 0;

  // 1) 선택 패키지 — 트림 바로 아래, 클릭 토글
  let pkgTotal = 0;
  let pkgPricedCount = 0;
  if (t.select_groups.length > 0) {
    const pkg = document.createElement('div');
    pkg.className = 'pkg-section';
    pkg.innerHTML = `<div class="pkg-title"><span>선택 패키지 (${t.select_groups.length}개)</span><span class="hint">클릭해서 추가</span></div><div class="pkg-grid"></div>`;
    const grid = pkg.querySelector('.pkg-grid');
    t.select_groups.forEach((group, idx) => {
      // 새 형식: { codes, price, name? }, 또는 옛 형식: [code, code]
      const codes = Array.isArray(group) ? group : (group.codes || []);
      const price = Array.isArray(group) ? null : group.price;
      const pkgName = !Array.isArray(group) && group.name ? group.name : null;
      const names = codes.map(c => cat.options[c]?.name || c);
      const isSelected = state.selectedPkgs.has(idx);
      if (isSelected && price) { pkgTotal += price; pkgPricedCount++; }
      const div = document.createElement('div');
      div.className = 'pkg' + (isSelected ? ' selected' : '');
      const head = pkgName && pkgName !== names[0] ? `<div class="pkg-head">${pkgName}${price ? ` <span class="pkg-price">${(price/10000).toFixed(0)}만</span>` : ''}</div>` : '';
      const body = pkgName && pkgName !== names[0] ? `<div class="pkg-items">${names.join(' · ')}</div>` : `<div class="pkg-name">${names.join(' + ')}${price ? ` <span class="pkg-price">${(price/10000).toFixed(0)}만</span>` : ''}</div>`;
      div.innerHTML = head + body;
      div.addEventListener('click', () => {
        if (state.selectedPkgs.has(idx)) state.selectedPkgs.delete(idx);
        else state.selectedPkgs.add(idx);
        renderCatalog();
      });
      grid.appendChild(div);
    });
    content.appendChild(pkg);
  }

  // 2) 가격 합계 — 트림 기본가 + 선택 패키지
  if (basePrice) {
    const total = basePrice + pkgTotal;
    const calc = document.createElement('div');
    calc.className = 'price-calc';
    const baseTxt = `${(basePrice/10000).toFixed(0)}만`;
    let extraTxt = '';
    if (state.selectedPkgs.size > 0) {
      if (pkgTotal > 0) {
        extraTxt = ` <span class="add">+ ${(pkgTotal/10000).toFixed(0)}만 (패키지 ${pkgPricedCount}개)</span>`;
        if (state.selectedPkgs.size > pkgPricedCount) {
          extraTxt += ` <span class="muted">+ 가격미상 ${state.selectedPkgs.size - pkgPricedCount}개</span>`;
        }
      } else {
        extraTxt = ` <span class="muted">+ 가격미상 ${state.selectedPkgs.size}개</span>`;
      }
    }
    calc.innerHTML = `
      <div class="breakdown">기본가 ${baseTxt}${extraTxt}</div>
      <div class="total"><span class="label">합계</span>${(total/10000).toFixed(0)}만원</div>
    `;
    content.appendChild(calc);
  }

  // 3) 카테고리별 표시 — 해당 트림에서 적용되는 옵션만 필터, but 적용 안 된 것도 흐리게 표시
  const catKeys = Object.keys(cat.categories).filter(k => k !== '선택사양');
  const basicSet = new Set(t.basic);
  const selectSet = new Set(t.select);
  catKeys.forEach(catName => {
    const codes = cat.categories[catName];
    const block = document.createElement('div');
    block.className = 'category-block';
    const applied = codes.filter(c => basicSet.has(c) || selectSet.has(c));
    block.innerHTML = `<div class="cat-title"><span>${catName}</span><span class="count">${applied.length} / ${codes.length}</span></div><div class="opt-grid"></div>`;
    const grid = block.querySelector('.opt-grid');
    codes.forEach(code => {
      const info = cat.options[code];
      const isBasic = basicSet.has(code);
      const isSelect = selectSet.has(code);
      const cls = isBasic ? 'basic' : (isSelect ? 'select' : '');
      const div = document.createElement('div');
      div.className = 'opt ' + cls;
      const badge = isBasic ? '' : (isSelect ? '<span class="badge">선택</span>' : '<span class="badge">미적용</span>');
      div.innerHTML = `<span>${info.name}</span>${badge}`;
      grid.appendChild(div);
    });
    content.appendChild(block);
  });

  $('rawJson').textContent = JSON.stringify(cat, null, 2);

  // 제조사 옵션 카운트 (collapsible 헤더)
  const totalOpts = Object.keys(cat.options).length;
  $('manuCount').textContent = `(${t.basic.length + t.select.length} / ${totalOpts}, 패키지 ${t.select_groups.length})`;

  // 프리패스 표준 옵션 — 트림 시드에서 자동 프리필
  $('fpOptionsSection').style.display = 'block';
  prefillFpFromSeed();
  renderFpOptions();
}

async function init() {
  const data = await loadMaster();
  if (!data) {
    $('status').textContent = '⚠️ 프리패스 차종 매트릭스 로드 실패';
    $('status').classList.add('warn');
    return;
  }
  state.master = data;
  $('status').textContent = `프리패스 차종 매트릭스 ${data.length}건 로드 완료.`;
  fillMakers();
  $('maker').addEventListener('change', onMakerChange);
  $('model').addEventListener('change', onModelChange);
  $('sub').addEventListener('change', onSubChange);
  $('trim').addEventListener('change', onTrimChange);
  $('showYear').addEventListener('change', () => {
    if ($('model').value) onModelChange();   // sub dropdown 다시 그림
  });
  $('rawToggle').addEventListener('click', () => {
    const pre = $('rawJson');
    pre.style.display = pre.style.display === 'none' ? 'block' : 'none';
    $('rawToggle').textContent = pre.style.display === 'none' ? '▾ 원본 JSON 보기' : '▴ 원본 JSON 숨기기';
  });
  $('manuToggle').addEventListener('click', () => {
    const w = $('manuWrap');
    w.classList.toggle('open');
    $('manuChevron').textContent = w.classList.contains('open') ? '▴' : '▾';
  });
  $('fpAllToggle').addEventListener('click', () => {
    const w = $('fpAllWrap');
    w.classList.toggle('open');
    $('fpChevron').textContent = w.classList.contains('open') ? '▴' : '▾';
  });
}

init();
</script>

</body>
</html>
